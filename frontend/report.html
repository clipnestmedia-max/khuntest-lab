<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>KHUNTEST LABS Report</title>
  <meta name="robots" content="noindex, nofollow">
  <script src="seo.js" defer></script>
  <style>
    @page {
      size: A4 portrait;
      margin: 0;
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      margin: 0;
      padding: 0;
      background: #e5e7eb;
      color: #111;
      font-family: Arial, Helvetica, sans-serif;
      font-size: 11px;
      line-height: 1.2;
    }

    .no-print {
      position: sticky;
      top: 0;
      z-index: 20;
      display: flex;
      justify-content: center;
      gap: 10px;
      flex-wrap: wrap;
      padding: 12px;
      background: #f8fafc;
      border-bottom: 1px solid #cbd5e1;
    }

    .no-print button {
      border: 0;
      border-radius: 8px;
      padding: 10px 16px;
      background: #062b59;
      color: #fff;
      font-weight: 700;
      cursor: pointer;
    }

    .no-print .back-btn {
      background: #d60000;
    }

    .no-print .pdf-btn {
      background: #0b4d92;
    }

    .print-note {
      width: 100%;
      color: #334155;
      text-align: center;
      font-size: 12px;
    }

    .hidden {
      display: none !important;
    }

    .report-preview-wrap {
      overflow-x: auto;
      padding: 1px 0 24px;
    }

    .report-page {
      width: 210mm;
      height: 297mm;
      margin: 20px auto;
      background: #fff;
      box-shadow: 0 0 18px rgba(0,0,0,0.18);
      position: relative;
      overflow: hidden;
    }

    .lab-letterhead {
      position: absolute;
      inset: 0 0 auto 0;
      height: 39mm;
      z-index: 3;
    }

    .top-red-strip {
      position: absolute;
      top: 2.5mm;
      left: 3.5mm;
      right: 3.5mm;
      height: 7.5mm;
      background: #e30613;
    }

    .header-white-mask {
      position: absolute;
      top: 10mm;
      left: 3.5mm;
      width: 124mm;
      height: 25mm;
      background: #fff;
      transform: skewX(-20deg);
      transform-origin: left top;

    .brand-block {
      position: absolute;

      left: 9mm;

    .brand-mark {

      overflow: hidden;

    .brand-mark img {

    .brand-title {

      line-height: .78;

    .brand-title .red {

    }

    .brand-lab {

    .brand-lab::before,

    .contact-panel {

    }

    }

    .group-row td {

      font-weight: 800;

    .parameter-name {

    }

    .result-value {
      font-weight: 700;

    .note-row td {

      font-style: italic;

    .subhead-row td {
      padding-top: 1.5mm;
      font-weight: 800;

    .comment-row td {

    .lft-section {

      text-align: center;
      text-transform: uppercase;
      font-size: 4.2mm;

      font-size: 3.15mm;
      font-weight: 700;
    }

    .lft-table {

      table-layout: fixed;

    .lft-table thead {

      border-bottom: 1.2px solid #111;
      text-align: left;
      font-size: 3.45mm;
      font-weight: 900;
    }

    .lft-table td {
      padding: 1mm 1.4mm;
      border-bottom: .35px solid rgba(17, 17, 17, .25);
      vertical-align: top;
      break-inside: avoid;
      page-break-inside: avoid;
    }

    .lft-investigation-col {
      width: 40%;
    }

    .lft-result-col {
      width: 18%;
      text-align: center;
    }

    .lft-range-col {
      width: 28%;
      text-align: center;
    }

    .lft-unit-col {
      width: 14%;
      text-align: center;
    }

    .lft-table th.lft-result-col,
    .lft-table th.lft-range-col,

    .lft-param-name {

      font-weight: 800;

    .lft-method,
    .lft-calculated {

      margin-top: .45mm;

      font-size: 2.65mm;

    .lft-result-value {

    }

    .lft-flag {

      font-size: 2.55mm;

      line-height: 1.1;

    .lft-critical-low .lft-result-col {

    .signature-name {

    .report-footer {

    .footer-note-icon {

    .footer-navy {

      left: 0;
      bottom: 0;

      clip-path: polygon(0 0, 65mm 0, 72mm 100%, 0 100%);

    .footer-white-cuts {
      position: absolute;
      left: 67mm;
      bottom: 9.2mm;
      width: 21mm;
      height: 6mm;
      transform: skewX(25deg);
      background:
        linear-gradient(90deg, transparent 0 2mm, #fff 2mm 3.1mm, transparent 3.1mm 5mm, #7ea0c6 5mm 6mm, transparent 6mm 7.8mm, #fff 7.8mm 8.8mm, transparent 8.8mm);
    }

    .footer-red-slashes {
      position: absolute;
      left: 19mm;
      bottom: 2mm;
      width: 23mm;
      height: 8mm;
      transform: skewX(15deg);
      background:
        linear-gradient(90deg, transparent 0 2mm, #e30613 2mm 3.1mm, transparent 3.1mm 4.9mm, #e30613 4.9mm 6mm, transparent 6mm 7.8mm, #e30613 7.8mm 8.9mm, transparent 8.9mm 10.7mm, #e30613 10.7mm 11.8mm, transparent 11.8mm);
    }

    .loading,
    .error-box {
      max-width: 760px;
      margin: 70px auto;
      padding: 28px;
      border-radius: 14px;
      background: #fff;
      text-align: center;
      box-shadow: 0 10px 35px rgba(0,0,0,.15);

    }

    .loading {

    }

    .error-box {

    }

    @media (max-width: 900px) {
      .report-page {
        margin: 12px;
      }
    }

    @media print {
      html,
      body {
        width: 210mm;
        min-height: 297mm;
        margin: 0;
        padding: 0;
        background: #fff;
      }

      .no-print {
        display: none !important;
      }

      .report-preview-wrap {
        padding: 0;
        overflow: visible;
      }

      .report-page {
        width: 210mm;
        height: 297mm;
        box-sizing: border-box;
        page-break-after: always;
        break-after: page;
        background: #fff;
        overflow: hidden;
        margin: 0;
        box-shadow: none;
      }

      .report-page:last-child {
        page-break-after: auto;
        break-after: auto;
      }

      .lft-table tr,
      .lft-notes li {

        page-break-inside: avoid;

      a {

<body>
  <div class="no-print">
    <button onclick="window.print()">Print Report</button>
    <button class="pdf-btn" onclick="window.print()">Download/Save PDF</button>
    <button id="shareWhatsAppBtn" class="hidden" onclick="shareReportWhatsApp()">Share on WhatsApp</button>
    <button class="back-btn" onclick="window.location.href='admin-dashboard.html'">Back to Dashboard</button>
    <div class="print-note">For best print: Paper A4, Scale 100%, Margins None/Default, Background Graphics ON.</div>
  </div>

  <main id="app" class="loading">Loading report...</main>

  <script type="module">
    import { getBookingByBillNo, getReportByBillNo } from "./firebase-service.js";

    const ROWS_PER_PAGE = 22;

    function getParams() {
      return new URLSearchParams(window.location.search);
    }

    function getBillNo() {
      const params = getParams();
      return params.get("bill") || params.get("billNo") || params.get("bill_no") || "";
    }

    function safe(value) {
      if (value === null || value === undefined) return "";
      return String(value)
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }

    function normalizePatientName(value) {
      return String(value || "").trim().replace(/\s+/g, " ").toUpperCase();
    }

    function pick(obj, keys, fallback = "") {
      if (!obj) return fallback;
      for (const key of keys) {
        if (obj[key] !== undefined && obj[key] !== null && obj[key] !== "") return obj[key];
      }
      return fallback;
    }

    function formatDate(value) {
      if (!value) return "";
      const date = value.toDate ? value.toDate() : new Date(value);
      if (isNaN(date.getTime())) return String(value);
      return date.toLocaleString("en-IN", {
        day: "2-digit",
        month: "2-digit",
        year: "numeric",
        hour: "2-digit",
        minute: "2-digit",
        hour12: false
      }).replace(",", "");
    }

    function isCBCTest(test) {
      const text = `${test?.name || ""} ${test?.testName || ""} ${test?.testCode || ""}`.toLowerCase();
      return text.includes("cbc") || text.includes("complete blood count");
    }

    function compactKey(value) {
      return String(value || "").toLowerCase().replace(/[^a-z0-9]/g, "");
    }

    function isLFTText(value) {
      const text = String(value || "").toLowerCase();
      const key = compactKey(value);
      return key === "lft" || text.includes("liver function");
    }

    function isLFTParameterName(value) {
      const text = String(value || "").toLowerCase();
      return [
        "bilirubin",
        "sgot",
        "sgpt",
        " ast",
        " alt",
        "alkaline phosphatase",
        "total protein",
        "albumin",
        "globulin",
        "a/g ratio",
        "ag ratio"
      ].some((term) => text.includes(term));
    }

    function isAstAltRatioParameter(row) {
      const key = compactKey(row?.parameterName || row?.name || row?.code || row?.testName || "");
      return ["astalt", "sgotsgpt", "astaltratio", "sgotsgptratio"].some((alias) => key.includes(alias));
    }

    function isLFTGroup(group) {
      return isLFTText(group?.testName) || isLFTText(group?.category) || (
        Array.isArray(group?.rows) &&
        group.rows.length >= 4 &&
        group.rows.every((row) => isLFTText(row.testName) || isLFTParameterName(row.parameterName))
      );
    }

    function getFullCBCParameters() {
      return [
        { name: "Haemoglobin", normalRange: "M: 13.2-16.6, F: 11.6-15.0", unit: "g/dL", sample: "W.B. EDTA", method: "Non-cyanide Hb" },
        { name: "WBC Count", normalRange: "4000-11000", unit: "cmm", sample: "W.B. EDTA", method: "DC Detection" },
        { name: "DIFFERENTIAL COUNT OF W.B.C", type: "heading", isHeading: true },
        { name: "Neutrophils", normalRange: "40-75", unit: "%" },
        { name: "Lymphocytes", normalRange: "20-50", unit: "%" },
        { name: "Monocytes", normalRange: "2-8", unit: "%" },
        { name: "Eosinophils", normalRange: "1-6", unit: "%" },
        { name: "Basophils", normalRange: "0-1", unit: "%" },
        { name: "RBC Count", normalRange: "3.5-5.5", unit: "mill/cumm" },
        { name: "PCV/HCT", normalRange: "34-47", unit: "%" },
        { name: "MCV", normalRange: "80-96", unit: "fL" },
        { name: "MCH", normalRange: "27.5-33.2", unit: "pg" },
        { name: "MCHC", normalRange: "33.4-35.5", unit: "%" },
        { name: "RDW-CV", normalRange: "11.0-16.0", unit: "%" },
        { name: "RDW-SD", normalRange: "35.0-56.0", unit: "fL" },
        { name: "MPV", normalRange: "6.5-12.0", unit: "fL" },
        { name: "Platelet Count", normalRange: "1,50,000-4,50,000", unit: "/µL" },
        { name: "PCT", normalRange: "0.108-0.282", unit: "%" },
        { name: "P-LCR", normalRange: "11.0-45.0", unit: "%" },
        { name: "P-LCC", normalRange: "30-90", unit: "10^9/L" },
        { name: "PDW", normalRange: "9.0-17.0", unit: "fL" }
      ];
    }

    function cbcParameterKey(name) {
      const key = String(name || "").toLowerCase().replace(/[^a-z0-9]/g, "");
      const aliases = {
        wbc: "wbccount",
        wbccount: "wbccount",
        rbc: "rbccount",
        rbccount: "rbccount",
        pcv: "pcvhct",
        hct: "pcvhct",
        pcvhct: "pcvhct",
        platelets: "plateletcount",
        plateletscounts: "plateletcount",
        plateletcount: "plateletcount",
        rdwcv: "rdwcv",
        rdw: "rdwcv",
        rdwsd: "rdwsd",
        differentialcount: "differentialcountofwbc",
        differentialcountofwbc: "differentialcountofwbc"
      };
      return aliases[key] || key;
    }

    function normalizeResult(row) {
      const testName = pick(row, ["testName", "test_name", "test", "groupName", "group"], "");
      const parameterName = pick(row, ["parameterName", "parameter_name", "parameter", "test_parameter", "name"], testName);
      const headingText = String(parameterName || "").toLowerCase();
      return {
        category: pick(row, ["category", "department", "section"], ""),
        testName,
        parameterName,
        resultValue: pick(row, ["resultValue", "result_value", "value", "finding", "result"], ""),
        normalValue: pick(row, ["normalRange", "normalValue", "normal_value", "referenceRange", "reference_range", "range", "normal"], ""),
        unit: pick(row, ["unit", "units"], ""),
        method: pick(row, ["method", "methodName", "method_name"], ""),
        sample: pick(row, ["sample", "sampleType", "sample_type"], ""),
        comment: pick(row, ["comment", "remarks", "description", "interpretation"], ""),
        label: pick(row, ["label", "calculatedLabel", "calculated_label"], ""),
        formula: pick(row, ["formula"], ""),
        code: pick(row, ["code", "parameterCode", "parameter_code"], ""),
        flag: pick(row, ["flag", "abnormalFlag", "abnormal_flag", "resultFlag", "result_flag", "statusFlag", "status_flag"], ""),
        calculated: Boolean(row.calculated || row.isCalculated || row.is_calculated || row.calculationSource || row.calculation_source),
        sourceParameters: Array.isArray(row.sourceParameters) ? row.sourceParameters : [],
        details: Array.isArray(row.details) ? row.details : [],
        isHeading: Boolean(row.isHeading || row.heading || row.type === "heading" || headingText.includes("differential count"))
      };
    }

    function normalizeResults(results) {
      if (!Array.isArray(results)) return [];
      return results.map(normalizeResult).filter((row) => (
        row.category || row.testName || row.parameterName || row.resultValue || row.normalValue || row.unit || row.comment || row.details.length
      ));
    }

    function completeCBCResults(report, results) {
      const tests = [
        ...(Array.isArray(report.tests) ? report.tests : []),
        ...(Array.isArray(report.selectedTests) ? report.selectedTests : [])
      ];
      const hasCBC = tests.some(isCBCTest) || results.some((row) => isCBCTest({ name: row.testName || row.parameterName }));
      if (!hasCBC) return results;
      const cbcTest = tests.find(isCBCTest) || results.find((row) => isCBCTest({ name: row.testName || row.parameterName })) || {};
      const cbcName = cbcTest.name || cbcTest.testName || "COMPLETE BLOOD COUNT(CBC)";
      const cbcCategory = cbcTest.category || results.find((row) => isCBCTest({ name: row.testName || row.parameterName }))?.category || "HAEMATOLOGY";
      const cbcExisting = results.filter((row) => isCBCTest({ name: row.testName || row.parameterName }));
      const cbcRows = getFullCBCParameters().map((parameter) => {
        const existing = cbcExisting.find((row) => cbcParameterKey(row.parameterName) === cbcParameterKey(parameter.name));
        return normalizeResult({
          category: cbcCategory,
          testName: cbcName,
          parameterName: parameter.name,
          resultValue: existing?.resultValue || "",
          normalRange: parameter.normalRange || existing?.normalValue || "",
          unit: parameter.unit || existing?.unit || "",
          method: parameter.method || existing?.method || "",
          sample: parameter.sample || existing?.sample || "",
          type: parameter.type || existing?.type || "",
          isHeading: Boolean(parameter.isHeading || existing?.isHeading),
          comment: existing?.comment || ""
        });
      });
      const nonCBC = results.filter((row) => !isCBCTest({ name: row.testName || row.parameterName }));
      return [...nonCBC, ...cbcRows];
    }

    function groupResults(results) {
      const groups = new Map();
      results.forEach((row) => {
        const category = row.category || "";
        const testName = row.testName || row.parameterName || "Report";
        const key = `${category}__${testName}`;
        if (!groups.has(key)) {
          groups.set(key, { category, testName, rows: [], comments: [] });
        }
        const group = groups.get(key);
        group.rows.push(row);
        if (row.comment && !row.method && !row.sample && row.parameterName === row.testName) {
          group.comments.push(row.comment);
        }
      });
      return Array.from(groups.values());
    }

    function chunkRows(rows) {
      const chunks = [];
      for (let i = 0; i < rows.length; i += ROWS_PER_PAGE) {
        chunks.push(rows.slice(i, i + ROWS_PER_PAGE));
      }
      return chunks.length ? chunks : [[]];
    }

    function noteText(row) {
      const parts = [];
      if (row.sample) parts.push(`Sample-${row.sample}`);
      if (row.method) parts.push(`Method- ${row.method}`);
      return parts.join(" ");
    }

    function rowHtml(row) {
      if (row.isHeading && row.parameterName) {
        return `<tr class="subhead-row"><td colspan="4">${safe(row.parameterName)}</td></tr>`;
      }

      let html = `
        <tr>
          <td class="test-col"><span class="parameter-name">${safe(row.parameterName || row.testName)}</span></td>
          <td class="result-col result-value">${safe(row.resultValue)}</td>
          <td class="range-col">${safe(row.normalValue)}</td>
          <td class="unit-col">${safe(row.unit)}</td>
        </tr>
      `;

      const note = noteText(row);
      if (note) {
        html += `<tr class="note-row"><td colspan="4">${safe(note)}</td></tr>`;
      }

      if (row.comment && (row.method || row.sample || row.parameterName !== row.testName)) {
        html += `<tr class="comment-row"><td colspan="4">${safe(row.comment)}</td></tr>`;
      }

      row.details.forEach((detail) => {
        const detailRow = normalizeResult(detail);
        html += `
          <tr>
            <td class="test-col"><span class="parameter-name">${safe(detailRow.parameterName || detailRow.testName)}</span></td>

          </tr>
        `;
        const detailNote = noteText(detailRow);
        if (detailNote) html += `<tr class="note-row"><td colspan="4">${safe(detailNote)}</td></tr>`;
      });

      return html;
    }

    const LFT_ORDER = [
      ["astsgot", "sgotast", "ast", "sgot"],
      ["altsgpt", "sgptalt", "alt", "sgpt"],
      ["ggt", "ggtp", "gammaglutamyltransferase"],
      ["alkalinephosphatase", "alp"],
      ["bilirubintotal", "totalbilirubin", "tbilirubin"],
      ["bilirubindirect", "directbilirubin", "dbilirubin"],
      ["bilirubinindirect", "indirectbilirubin", "ibilirubin"],
      ["totalprotein", "totalproteins"],
      ["albumin"],
      ["globulin"],

    const LFT_DEFAULT_NOTES = [
      "Increased AST and ALT levels should be correlated with clinical findings, history, and medication use.",

      "In chronic liver disease, ELF, AFP, or DCP/PIVKA II testing may be considered when clinically indicated."
    ];

    function lftSortIndex(row) {
      const key = compactKey(row.parameterName || row.testName);
      const index = LFT_ORDER.findIndex((aliases) => aliases.some((alias) => (
        alias.length <= 3 ? key === alias : key.includes(alias)
      )));
      return index === -1 ? 999 : index;
    }

    function normalizeFlag(value) {
      const flag = String(value || "").trim().toLowerCase();
      if (!flag) return null;
      if (["ch", "critical high", "critical-high", "panic high", "panic-high"].includes(flag) || flag.includes("critical high")) {
        return { className: "lft-critical-high", label: "Critical High" };
      }
      if (["cl", "critical low", "critical-low", "panic low", "panic-low"].includes(flag) || flag.includes("critical low")) {
        return { className: "lft-critical-low", label: "Critical Low" };
      }
      if (["h", "high", "hi", "above", "above range"].includes(flag) || flag.includes("high")) {
        return { className: "lft-high", label: "High" };
      }
      if (["l", "low", "lo", "below", "below range"].includes(flag) || flag.includes("low")) {
        return { className: "lft-low", label: "Low" };
      }
      return null;
    }

    function lftRowHtml(row) {
      const flag = normalizeFlag(row.flag);
      const rowClass = flag ? flag.className : "";
      const resultValue = row.resultValue || (row.calculated ? "Not available" : "");
      return `
        <tr class="${rowClass}">
          <td class="lft-investigation-col">
            <span class="lft-param-name">${safe(row.parameterName || row.testName)}</span>

            ${flag ? `<span class="lft-flag">${safe(flag.label)}</span>` : ""}
          </td>
          <td class="lft-range-col">${safe(row.normalValue)}</td>
          <td class="lft-unit-col">${safe(row.unit)}</td>
        </tr>
      `;
    }

    function approvedLFTNotes(group, rows, showEnd) {
      if (!showEnd) return [];
      const notes = [];
      rows.forEach((row) => {
        if (row.comment) notes.push(row.comment);
      });
      group.comments.forEach((comment) => notes.push(comment));
      LFT_DEFAULT_NOTES.forEach((note) => notes.push(note));
      return Array.from(new Set(notes.map((note) => String(note).trim()).filter(Boolean)));
    }

    function renderLFTReportSection(group, rows, pageIndex, pageCount) {
      const showEnd = pageIndex === pageCount - 1;
      const continuation = pageIndex > 0 ? " (CONTINUED)" : "";

        .filter((row) => !isAstAltRatioParameter(row))
        .map((row, index) => ({ row, index }))
        .sort((a, b) => lftSortIndex(a.row) - lftSortIndex(b.row) || a.index - b.index)
        .map((item) => item.row);
      const notes = approvedLFTNotes(group, orderedRows, showEnd);

      return `

          { category: "HAEMATOLOGY", testName: "COMPLETE BLOOD COUNT(CBC)", parameterName: "RBC", resultValue: "4.6", normalValue: "3.8-5.2", unit: "million/cumm" },
          { category: "HAEMATOLOGY", testName: "COMPLETE BLOOD COUNT(CBC)", parameterName: "PCV", resultValue: "38.2", normalValue: "36-46", unit: "%" },
          { category: "HAEMATOLOGY", testName: "COMPLETE BLOOD COUNT(CBC)", parameterName: "MCV", resultValue: "83", normalValue: "80-100", unit: "fl" },
          { category: "HAEMATOLOGY", testName: "COMPLETE BLOOD COUNT(CBC)", parameterName: "MCH", resultValue: "28", normalValue: "27-32", unit: "pg" },
          { category: "HAEMATOLOGY", testName: "COMPLETE BLOOD COUNT(CBC)", parameterName: "MCHC", resultValue: "33", normalValue: "32-36", unit: "g/dl" },
          { category: "HAEMATOLOGY", testName: "COMPLETE BLOOD COUNT(CBC)", parameterName: "RDW", resultValue: "13.6", normalValue: "11.5-14.5", unit: "%" },
          { category: "HAEMATOLOGY", testName: "COMPLETE BLOOD COUNT(CBC)", parameterName: "Platelets", resultValue: "2.4", normalValue: "1.5-4.5", unit: "lakh/cumm" }
        ]
      };
    }

    async function loadReport() {
      const params = getParams();
      const billNo = getBillNo();

      if (params.get("mock") === "1" || params.get("mock") === "lft") {
        const report = params.get("mock") === "lft" ? mockLFTReport() : mockReport();
        renderReport(report, report.billNo);
        return;
      }

      if (!billNo) {
        showError("Bill number missing in report link.");
        return;
      }

      try {
        const report = await getReportByBillNo(billNo);
        if (!report) {
          await getBookingByBillNo(billNo);
          showError(`Report not found or not released yet.<br><br>Bill No: ${safe(billNo)}`);
          return;
        }
        renderReport(report, billNo);
        if (params.get("print") === "1") setTimeout(() => window.print(), 350);
      } catch (err) {
        console.error(err);
        showError(`Report loading failed.<br><br>${safe(err.message)}`);
      }
    }

    loadReport();
  </script>
</body>
