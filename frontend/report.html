<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>KhunTest Lab Report</title>
  <style>
    @page {
      size: A4 portrait;
      margin: 0;
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      margin: 0;
      padding: 0;
      background: #e5e7eb;
      color: #000;
      font-family: Arial, Helvetica, sans-serif;
      font-size: 11.5px;
      line-height: 1.22;
    }

    .no-print {
      position: sticky;
      top: 0;
      z-index: 20;
      display: flex;
      justify-content: center;
      gap: 10px;
      flex-wrap: wrap;
      padding: 12px;
      background: #f8fafc;
      border-bottom: 1px solid #cbd5e1;
    }

    .no-print button {
      border: 0;
      border-radius: 8px;
      padding: 10px 16px;
      background: #062b59;
      color: #fff;
      font-weight: 700;
      cursor: pointer;
    }

    .no-print .back-btn {
      background: #d60000;
    }

    .print-note {
      width: 100%;
      color: #334155;
      text-align: center;
      font-size: 12px;
    }

    .hidden {
      display: none !important;
    }

    .report-page {
      width: 210mm;
      min-height: 297mm;
      margin: 16px auto;
      background: #fff;
      box-shadow: 0 0 12px rgba(0,0,0,0.15);
      padding: 18mm 14mm 14mm 14mm;
      position: relative;
      overflow: hidden;
    }

    .report-header {
      border-top: 2px solid #111;
      border-bottom: 1.4px solid #111;
      padding: 3mm 2mm 2mm;
      display: grid;
      grid-template-columns: 34mm 1fr 32mm 63mm;
      gap: 4mm;
      align-items: center;
    }

    .barcode {
      height: 18mm;
      width: 18mm;
      background:
        repeating-linear-gradient(
          90deg,
          #000 0,
          #000 1.2px,
          #fff 1.2px,
          #fff 3.4px,
          #000 3.4px,
          #000 4.2px,
          #fff 4.2px,
          #fff 6.4px
        );
    }

    .patient-left,
    .patient-right {
      display: grid;
      gap: 2px;
    }

    .info-line {
      display: grid;
      grid-template-columns: auto 8px 1fr;
      gap: 2px;
      min-height: 14px;
      align-items: baseline;
    }

    .info-line .label {
      font-weight: 700;
    }

    .info-line .value {
      font-weight: 600;
      word-break: break-word;
    }

    .info-line .status {
      font-weight: 800;
    }

    .qr {
      width: 23mm;
      height: 23mm;
      margin-inline: auto;
      border: 1px solid #111;
      background:
        linear-gradient(90deg, #000 8%, transparent 8% 15%, #000 15% 22%, transparent 22% 36%, #000 36% 47%, transparent 47% 58%, #000 58% 69%, transparent 69% 80%, #000 80%),
        linear-gradient(#fff, #fff);
      opacity: .88;
    }

    .result-table {
      width: 100%;
      border-collapse: collapse;
      table-layout: fixed;
      margin-top: 0;
      font-size: 11.5px;
    }

    .result-table th {
      padding: 3px 5px 4px;
      border-top: 1.4px solid #111;
      border-bottom: 1.4px solid #111;
      text-align: center;
      font-size: 14px;
      font-weight: 800;
    }

    .result-table td {
      padding: 3.2px 5px;
      vertical-align: top;
    }

    .test-col {
      width: 40%;
    }

    .result-col {
      width: 17%;
      text-align: center;
    }

    .range-col {
      width: 29%;
      text-align: center;
    }

    .unit-col {
      width: 14%;
      text-align: center;
    }

    .category-row td {
      padding: 5px 5px 4px;
      text-align: center;
      text-decoration: underline;
      text-transform: uppercase;
      font-weight: 800;
    }

    .group-row td {
      padding-top: 7px;
      font-weight: 800;
      text-transform: none;
    }

    .result-value {
      font-weight: 400;
    }

    .note-row td {
      padding-top: 0;
      font-size: 10.7px;
      font-style: italic;
      line-height: 1.25;
    }

    .subhead-row td {
      padding-top: 7px;
      font-weight: 800;
      text-decoration: underline;
    }

    .comment-row td {
      padding-top: 7px;
      font-size: 10.4px;
      line-height: 1.35;
      text-align: justify;
    }

    .end-area {
      margin: 6px 5mm 0;
      border-top: 1px dotted #111;
      text-align: center;
      font-weight: 800;
      padding-top: 8px;
      font-size: 12px;
    }

    .continued {
      margin-top: 7px;
      text-align: right;
      font-size: 10.5px;
      font-style: italic;
    }

    .loading,
    .error-box {
      max-width: 760px;
      margin: 70px auto;
      padding: 28px;
      border-radius: 14px;
      background: #fff;
      text-align: center;
      box-shadow: 0 10px 35px rgba(0,0,0,.15);
      font-weight: 700;
    }

    .loading {
      color: #062b59;
    }

    .error-box {
      color: #991b1b;
    }

    @media (max-width: 900px) {
      .report-page {
        width: min(210mm, calc(100vw - 24px));
        min-height: auto;
        padding: 16mm 7mm 12mm;
      }

      .report-header {
        grid-template-columns: 24mm 1fr;
      }

      .qr {
        display: none;
      }

      .patient-right {
        grid-column: 1 / -1;
      }
    }

    @media print {
      html,
      body {
        width: 210mm;
        min-height: 297mm;
        margin: 0;
        padding: 0;
        background: #fff;
      }

      .no-print {
        display: none !important;
      }

      .report-page {
        width: 210mm;
        min-height: 297mm;
        height: 297mm;
        box-sizing: border-box;
        padding: 18mm 14mm 14mm 14mm;
        page-break-after: always;
        break-after: page;
        background: #fff;
        overflow: hidden;
        margin: 0;
        box-shadow: none;
      }

      .report-page:last-child {
        page-break-after: auto;
        break-after: auto;
      }

      a {
        color: #000;
        text-decoration: none;
      }
    }
  </style>
</head>
<body>
  <div class="no-print">
    <button onclick="window.print()">Print Report</button>
    <button id="shareWhatsAppBtn" class="hidden" onclick="shareReportWhatsApp()">Share on WhatsApp</button>
    <button class="back-btn" onclick="history.back()">Back</button>
    <div class="print-note">Print settings: A4 portrait, scale 100%, margins none/default, background graphics enabled if needed.</div>
  </div>

  <main id="app" class="loading">Loading report...</main>

  <script type="module">
    import { getReportByBillNo } from "./firebase-service.js";

    const ROWS_PER_PAGE = 25;

    function getParams() {
      return new URLSearchParams(window.location.search);
    }

    function getBillNo() {
      const params = getParams();
      return params.get("bill") || params.get("billNo") || params.get("bill_no") || "";
    }

    function safe(value) {
      if (value === null || value === undefined) return "";
      return String(value)
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }

    function pick(obj, keys, fallback = "") {
      if (!obj) return fallback;
      for (const key of keys) {
        if (obj[key] !== undefined && obj[key] !== null && obj[key] !== "") return obj[key];
      }
      return fallback;
    }

    function formatDate(value) {
      if (!value) return "";
      const date = value.toDate ? value.toDate() : new Date(value);
      if (isNaN(date.getTime())) return String(value);
      return date.toLocaleString("en-IN", {
        day: "2-digit",
        month: "2-digit",
        year: "numeric",
        hour: "2-digit",
        minute: "2-digit",
        hour12: false
      }).replace(",", "");
    }

    function normalizeResult(row) {
      const testName = pick(row, ["testName", "test_name", "test", "groupName", "group"], "");
      return {
        category: pick(row, ["category", "department", "section"], ""),
        testName,
        parameterName: pick(row, ["parameterName", "parameter_name", "parameter", "test_parameter", "name"], testName),
        resultValue: pick(row, ["resultValue", "result_value", "value", "finding", "result"], ""),
        normalValue: pick(row, ["normalRange", "normalValue", "normal_value", "referenceRange", "reference_range", "range", "normal"], ""),
        unit: pick(row, ["unit", "units"], ""),
        method: pick(row, ["method", "methodName", "method_name"], ""),
        sample: pick(row, ["sample", "sampleType", "sample_type"], ""),
        comment: pick(row, ["comment", "remarks", "description", "interpretation"], ""),
        details: Array.isArray(row.details) ? row.details : [],
        isHeading: Boolean(row.isHeading || row.heading || row.type === "heading")
      };
    }

    function normalizeResults(results) {
      if (!Array.isArray(results)) return [];
      return results.map(normalizeResult).filter((row) => (
        row.category || row.testName || row.parameterName || row.resultValue || row.normalValue || row.unit || row.comment || row.details.length
      ));
    }

    function groupResults(results) {
      const groups = new Map();
      results.forEach((row) => {
        const category = row.category || "";
        const testName = row.testName || row.parameterName || "Report";
        const key = `${category}__${testName}`;
        if (!groups.has(key)) {
          groups.set(key, { category, testName, rows: [], comments: [] });
        }
        const group = groups.get(key);
        group.rows.push(row);
        if (row.comment && !row.method && !row.sample && row.parameterName === row.testName) {
          group.comments.push(row.comment);
        }
      });
      return Array.from(groups.values());
    }

    function chunkRows(rows) {
      const chunks = [];
      for (let i = 0; i < rows.length; i += ROWS_PER_PAGE) {
        chunks.push(rows.slice(i, i + ROWS_PER_PAGE));
      }
      return chunks.length ? chunks : [[]];
    }

    function noteText(row) {
      const parts = [];
      if (row.sample) parts.push(`Sample-${row.sample}`);
      if (row.method) parts.push(`Method- ${row.method}`);
      return parts.join(" ");
    }

    function rowHtml(row) {
      if (row.isHeading && row.parameterName) {
        return `<tr class="subhead-row"><td colspan="4">${safe(row.parameterName)}</td></tr>`;
      }

      let html = `
        <tr>
          <td class="test-col">${safe(row.parameterName || row.testName)}</td>
          <td class="result-col result-value">${safe(row.resultValue)}</td>
          <td class="range-col">${safe(row.normalValue)}</td>
          <td class="unit-col">${safe(row.unit)}</td>
        </tr>
      `;

      const note = noteText(row);
      if (note) {
        html += `<tr class="note-row"><td colspan="4">${safe(note)}</td></tr>`;
      }

      if (row.comment && (row.method || row.sample || row.parameterName !== row.testName)) {
        html += `<tr class="comment-row"><td colspan="4">${safe(row.comment)}</td></tr>`;
      }

      row.details.forEach((detail) => {
        const detailRow = normalizeResult(detail);
        html += `
          <tr>
            <td class="test-col">${safe(detailRow.parameterName || detailRow.testName)}</td>
            <td class="result-col result-value">${safe(detailRow.resultValue)}</td>
            <td class="range-col">${safe(detailRow.normalValue)}</td>
            <td class="unit-col">${safe(detailRow.unit)}</td>
          </tr>
        `;
        const detailNote = noteText(detailRow);
        if (detailNote) html += `<tr class="note-row"><td colspan="4">${safe(detailNote)}</td></tr>`;
      });

      return html;
    }

    function patientHeader(report, billNo) {
      const patientName = pick(report, ["patientName", "patient_name", "name"], "");
      const age = pick(report, ["age", "patient_age"], "");
      const gender = pick(report, ["gender", "patient_gender"], "");
      const refBy = pick(report, ["refBy", "ref_by", "doctor", "refDoctor", "ref_doctor"], "");
      const collectionDate = pick(report, ["collectionDate", "collection_date", "collDate", "createdAt"], "");
      const registeredDate = pick(report, ["registeredDate", "registered_date", "createdAt", "created_at"], "");
      const reportedDate = pick(report, ["reportedDate", "reportingDate", "reporting_date", "releasedAt", "updatedAt"], "");
      const status = pick(report, ["reportStatus", "report_status", "status"], "Final");

      return `
        <header class="report-header">
          <div class="barcode" aria-hidden="true"></div>
          <div class="patient-left">
            <div class="info-line"><span class="label">PATIENT NAME</span><span>:</span><span class="value">${safe(patientName)}</span></div>
            <div class="info-line"><span>Bill No</span><span>:</span><span class="value">${safe(billNo)}</span></div>
            <div class="info-line"><span>Age/Gender</span><span>:</span><span class="value">${safe(age)}${age && gender ? "/" : ""}${safe(gender)}</span></div>
            <div class="info-line"><span class="label">Report Status</span><span>:</span><span class="value status">${safe(status || "Final")}</span></div>
          </div>
          <div class="qr" aria-hidden="true"></div>
          <div class="patient-right">
            <div class="info-line"><span>Registered Date</span><span>:</span><span class="value">${safe(formatDate(registeredDate))}</span></div>
            <div class="info-line"><span>Collection Date</span><span>:</span><span class="value">${safe(formatDate(collectionDate))}</span></div>
            <div class="info-line"><span>Reported Date</span><span>:</span><span class="value">${safe(formatDate(reportedDate))}</span></div>
            <div class="info-line"><span>Ref. By</span><span>:</span><span class="value">${safe(refBy)}</span></div>
          </div>
        </header>
      `;
    }

    function pageHtml(report, billNo, group, rows, pageIndex, pageCount) {
      const showEnd = pageIndex === pageCount - 1;
      const continuation = pageIndex > 0 ? " (Continued)" : "";
      return `
        <section class="report-page">
          ${patientHeader(report, billNo)}
          <table class="result-table">
            <thead>
              <tr>
                <th class="test-col">Test-Name</th>
                <th class="result-col">Results</th>
                <th class="range-col">Biological Reference Range</th>
                <th class="unit-col">Units</th>
              </tr>
            </thead>
            <tbody>
              ${group.category ? `<tr class="category-row"><td colspan="4">${safe(group.category)}</td></tr>` : ""}
              <tr class="group-row"><td colspan="4">${safe(group.testName)}${safe(continuation)}</td></tr>
              ${rows.length ? rows.map(rowHtml).join("") : `<tr><td colspan="4" style="text-align:center;font-weight:700;padding:18px;">Report result not available.</td></tr>`}
              ${showEnd && group.comments.length ? `<tr class="comment-row"><td colspan="4">${safe(group.comments.join(" "))}</td></tr>` : ""}
            </tbody>
          </table>
          ${showEnd ? `<div class="end-area">*** End of Report ***</div>` : `<div class="continued">Continued on next page</div>`}
        </section>
      `;
    }

    function renderReport(report, billNo) {
      const results = normalizeResults(report.results || report.reportResults || []);
      if (!results.length) {
        showError(`Report is not released yet or result was not saved permanently.<br><br>Bill No: ${safe(billNo)}`);
        return;
      }

      const groups = groupResults(results);
      const pages = [];
      groups.forEach((group) => {
        const chunks = chunkRows(group.rows);
        chunks.forEach((rows, index) => {
          pages.push(pageHtml(report, billNo, group, rows, index, chunks.length));
        });
      });

      document.title = "Report - " + billNo;
      const app = document.getElementById("app");
      app.className = "";
      app.innerHTML = pages.join("");
      window.currentReportForShare = { report, billNo };
      const shareBtn = document.getElementById("shareWhatsAppBtn");
      const phone = String(report.whatsapp || report.phone || "").replace(/\D/g, "");
      shareBtn.classList.toggle("hidden", !phone);
    }

    window.shareReportWhatsApp = function() {
      const current = window.currentReportForShare;
      if (!current) return;
      const { report, billNo } = current;
      const phone = String(report.whatsapp || report.phone || "").replace(/\D/g, "");
      if (!phone) return;
      const fullPhone = phone.length === 10 ? "91" + phone : phone;
      const patientName = pick(report, ["patientName", "patient_name", "name"], "Patient");
      const reportUrl = `https://khuntest-lab-e5966.web.app/report.html?bill=${encodeURIComponent(billNo)}`;
      const message = `Hello ${patientName},\nYour KhunTest Lab report is ready.\n\nDownload report:\n${reportUrl}\n\nThank you,\nKhunTest Lab\n+91 9234277007`;
      window.open(`https://wa.me/${encodeURIComponent(fullPhone)}?text=${encodeURIComponent(message)}`, "_blank");
    };

    function showError(message) {
      const app = document.getElementById("app");
      app.className = "error-box";
      app.innerHTML = message;
    }

    function mockReport() {
      const now = new Date("2026-04-28T14:42:00");
      return {
        billNo: "880",
        patientName: "SOBHA DEVI",
        age: "24y",
        gender: "Female",
        doctor: "Dr N.K SUMAN(MBBS, MD)",
        status: "Final",
        createdAt: "2026-04-28T12:56:00",
        collectionDate: "2026-04-28T12:56:00",
        releasedAt: now,
        results: [
          { category: "BIO-CHEMISTRY", testName: "Blood Sugar (Random)", parameterName: "Blood Sugar (Random)", resultValue: "90", normalValue: "74-140 mg/dl", unit: "mg/dl", sample: "Plasma, Fluoride", method: "GOD/PAP (Rx daytona plus/Rx monaco)" },
          { category: "SPECIAL TEST", testName: "Serum IgE", parameterName: "Serum IgE", resultValue: "180", normalValue: "0-100", unit: "IU/ml", sample: "Serum", method: "CLIA", comment: "Serum IgE values may vary with age, allergic status and clinical condition. Please correlate clinically." },
          { category: "HAEMATOLOGY", testName: "COMPLETE BLOOD COUNT(CBC)", parameterName: "Haemoglobin", resultValue: "12.8", normalValue: "12.0-15.0", unit: "gm/dl", sample: "EDTA Whole Blood", method: "Automated Cell Counter" },
          { category: "HAEMATOLOGY", testName: "COMPLETE BLOOD COUNT(CBC)", parameterName: "WBC", resultValue: "7800", normalValue: "4000-11000", unit: "/cumm" },
          { category: "HAEMATOLOGY", testName: "COMPLETE BLOOD COUNT(CBC)", parameterName: "Differential Count", isHeading: true },
          { category: "HAEMATOLOGY", testName: "COMPLETE BLOOD COUNT(CBC)", parameterName: "Neutrophils", resultValue: "62", normalValue: "40-75", unit: "%" },
          { category: "HAEMATOLOGY", testName: "COMPLETE BLOOD COUNT(CBC)", parameterName: "Lymphocytes", resultValue: "32", normalValue: "20-45", unit: "%" },
          { category: "HAEMATOLOGY", testName: "COMPLETE BLOOD COUNT(CBC)", parameterName: "Monocytes", resultValue: "04", normalValue: "02-10", unit: "%" },
          { category: "HAEMATOLOGY", testName: "COMPLETE BLOOD COUNT(CBC)", parameterName: "Eosinophils", resultValue: "02", normalValue: "01-06", unit: "%" },
          { category: "HAEMATOLOGY", testName: "COMPLETE BLOOD COUNT(CBC)", parameterName: "RBC", resultValue: "4.6", normalValue: "3.8-5.2", unit: "million/cumm" },
          { category: "HAEMATOLOGY", testName: "COMPLETE BLOOD COUNT(CBC)", parameterName: "PCV", resultValue: "38.2", normalValue: "36-46", unit: "%" },
          { category: "HAEMATOLOGY", testName: "COMPLETE BLOOD COUNT(CBC)", parameterName: "MCV", resultValue: "83", normalValue: "80-100", unit: "fl" },
          { category: "HAEMATOLOGY", testName: "COMPLETE BLOOD COUNT(CBC)", parameterName: "MCH", resultValue: "28", normalValue: "27-32", unit: "pg" },
          { category: "HAEMATOLOGY", testName: "COMPLETE BLOOD COUNT(CBC)", parameterName: "MCHC", resultValue: "33", normalValue: "32-36", unit: "g/dl" },
          { category: "HAEMATOLOGY", testName: "COMPLETE BLOOD COUNT(CBC)", parameterName: "RDW", resultValue: "13.6", normalValue: "11.5-14.5", unit: "%" },
          { category: "HAEMATOLOGY", testName: "COMPLETE BLOOD COUNT(CBC)", parameterName: "Platelets", resultValue: "2.4", normalValue: "1.5-4.5", unit: "lakh/cumm" }
        ]
      };
    }

    async function loadReport() {
      const params = getParams();
      const billNo = getBillNo();

      if (params.get("mock") === "1") {
        const report = mockReport();
        renderReport(report, report.billNo);
        return;
      }

      if (!billNo) {
        showError("Bill number missing in report link.");
        return;
      }

      try {
        const report = await getReportByBillNo(billNo);
        if (!report) {
          showError(`Report is not released yet or bill number was not found.<br><br>Bill No: ${safe(billNo)}`);
          return;
        }
        renderReport(report, billNo);
      } catch (err) {
        console.error(err);
        showError(`Report loading failed.<br><br>${safe(err.message)}`);
      }
    }

    loadReport();
  </script>
</body>
</html>
