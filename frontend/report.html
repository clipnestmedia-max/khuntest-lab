<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>KhunTest Lab Report</title>

  <style>
    @page {
      size: A4;
      margin: 10mm 12mm;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      padding: 0;
      background: #e5e7eb;
      font-family: Arial, Helvetica, sans-serif;
      color: #000;
      font-size: 12px;
    }

    .no-print {
      text-align: center;
      padding: 14px;
      background: #f8fafc;
      border-bottom: 1px solid #cbd5e1;
      position: sticky;
      top: 0;
      z-index: 9999;
    }

    .no-print button {
      background: #062b5f;
      color: #fff;
      border: none;
      padding: 10px 18px;
      border-radius: 8px;
      font-weight: 700;
      cursor: pointer;
      margin: 4px;
    }

    .no-print .back-btn {
      background: #d60000;
    }

    .report-page {
      width: 210mm;
      min-height: 297mm;
      margin: 18px auto;
      background: #fff;
      padding: 13mm 12mm 10mm 12mm;
      box-shadow: 0 10px 35px rgba(0,0,0,0.18);
      position: relative;
    }

    .lab-header {
      text-align: center;
      border-bottom: 2px solid #000;
      padding-bottom: 8px;
      margin-bottom: 12px;
    }

    .lab-name {
      font-size: 24px;
      font-weight: 800;
      letter-spacing: 0.5px;
      color: #062b5f;
      text-transform: uppercase;
      margin-bottom: 3px;
    }

    .lab-subtitle {
      font-size: 11px;
      font-weight: 700;
      color: #d60000;
      margin-bottom: 3px;
    }

    .lab-address {
      font-size: 10px;
      line-height: 1.35;
    }

    .patient-block {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 2px 26px;
      margin-top: 10px;
      margin-bottom: 12px;
    }

    .info-row {
      display: grid;
      grid-template-columns: 112px 10px 1fr;
      min-height: 18px;
      line-height: 1.35;
      font-size: 12px;
    }

    .info-row .label {
      font-weight: 700;
      text-transform: uppercase;
    }

    .info-row .colon {
      font-weight: 700;
      text-align: center;
    }

    .info-row .value {
      font-weight: 600;
    }

    .status-final {
      font-weight: 800;
    }

    .report-title {
      text-align: center;
      font-size: 13px;
      font-weight: 800;
      text-transform: uppercase;
      margin: 10px 0 6px 0;
      text-decoration: underline;
    }

    .result-table {
      width: 100%;
      border-collapse: collapse;
      margin-top: 6px;
      font-size: 12px;
    }

    .result-table th {
      text-align: left;
      border-bottom: 1.5px solid #000;
      border-top: 1.5px solid #000;
      padding: 5px 4px;
      font-weight: 800;
    }

    .result-table td {
      padding: 3.5px 4px;
      vertical-align: top;
      line-height: 1.3;
    }

    .result-table .test-col {
      width: 43%;
    }

    .result-table .result-col {
      width: 16%;
      text-align: left;
      font-weight: 700;
    }

    .result-table .range-col {
      width: 29%;
    }

    .result-table .unit-col {
      width: 12%;
    }

    .section-row td {
      font-weight: 800;
      padding-top: 8px;
      padding-bottom: 4px;
      text-transform: uppercase;
    }

    .main-test-row td {
      font-weight: 800;
      padding-top: 5px;
      text-transform: uppercase;
    }

    .method-row td {
      font-size: 10.2px;
      padding-top: 0;
      padding-bottom: 4px;
      color: #111;
      line-height: 1.25;
    }

    .description-row td {
      font-size: 10.5px;
      line-height: 1.35;
      text-align: justify;
      padding-top: 4px;
    }

    .end-report {
      text-align: center;
      font-weight: 800;
      margin-top: 18px;
      font-size: 12px;
    }

    .signature-area {
      margin-top: 35px;
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 40px;
      font-size: 11px;
    }

    .signature-box {
      text-align: center;
      padding-top: 28px;
    }

    .signature-line {
      border-top: 1px solid #000;
      padding-top: 5px;
      font-weight: 700;
    }

    .error-box {
      max-width: 700px;
      margin: 70px auto;
      background: #fff;
      border-radius: 14px;
      padding: 28px;
      text-align: center;
      color: #991b1b;
      box-shadow: 0 10px 35px rgba(0,0,0,0.15);
      font-weight: 700;
    }

    .loading {
      max-width: 700px;
      margin: 70px auto;
      background: #fff;
      border-radius: 14px;
      padding: 28px;
      text-align: center;
      color: #062b5f;
      box-shadow: 0 10px 35px rgba(0,0,0,0.15);
      font-weight: 700;
    }

    @media print {
      body {
        background: #fff !important;
        font-size: 12px;
      }

      .no-print {
        display: none !important;
      }

      .report-page {
        width: auto;
        min-height: auto;
        margin: 0;
        padding: 0;
        box-shadow: none;
      }

      .lab-header {
        margin-top: 0;
      }

      a {
        color: #000;
        text-decoration: none;
      }
    }
  </style>
</head>

<body>
  <div class="no-print">
    <button onclick="window.print()">Print / Save PDF</button>
    <button class="back-btn" onclick="history.back()">Back</button>
  </div>

  <div id="app" class="loading">Loading report...</div>

  <script>
    function getBillNo() {
      const params = new URLSearchParams(window.location.search);
      return params.get("bill") || params.get("billNo") || params.get("bill_no") || "";
    }

    function safe(value) {
      if (value === null || value === undefined) return "";
      return String(value)
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }

    function pick(obj, keys, fallback = "") {
      if (!obj) return fallback;
      for (const key of keys) {
        if (obj[key] !== undefined && obj[key] !== null && obj[key] !== "") {
          return obj[key];
        }
      }
      return fallback;
    }

    function formatDate(value) {
      if (!value) return "";
      const d = new Date(value);
      if (isNaN(d.getTime())) return value;
      return d.toLocaleString("en-IN", {
        day: "2-digit",
        month: "2-digit",
        year: "numeric",
        hour: "2-digit",
        minute: "2-digit"
      });
    }

    function normalizeResults(results) {
      if (!Array.isArray(results)) return [];

      return results.map((r) => {
        return {
          testName: pick(r, ["test_name", "testName", "test", "category"], ""),
          parameterName: pick(r, ["parameter_name", "parameterName", "name", "test_parameter", "parameter"], ""),
          resultValue: pick(r, ["result_value", "resultValue", "value", "finding", "result"], ""),
          normalValue: pick(r, ["normal_value", "normalValue", "range", "reference_range", "referenceRange"], ""),
          unit: pick(r, ["unit", "units"], ""),
          comment: pick(r, ["comment", "method", "remarks", "description"], "")
        };
      });
    }

    function buildResultRows(results) {
      if (!results.length) {
        return `
          <tr>
            <td colspan="4" style="text-align:center;padding:20px;font-weight:700;">
              Report result not available.
            </td>
          </tr>
        `;
      }

      let html = "";
      let lastGroup = "";

      results.forEach((r) => {
        const group = r.testName || "";

        if (group && group !== lastGroup) {
          html += `
            <tr class="section-row">
              <td colspan="4">${safe(group)}</td>
            </tr>
          `;
          lastGroup = group;
        }

        html += `
          <tr>
            <td class="test-col">${safe(r.parameterName)}</td>
            <td class="result-col">${safe(r.resultValue)}</td>
            <td class="range-col">${safe(r.normalValue)}</td>
            <td class="unit-col">${safe(r.unit)}</td>
          </tr>
        `;

        if (r.comment) {
          html += `
            <tr class="method-row">
              <td colspan="4">${safe(r.comment)}</td>
            </tr>
          `;
        }
      });

      return html;
    }

    async function loadReport() {
      const billNo = getBillNo();

      if (!billNo) {
        document.getElementById("app").className = "error-box";
        document.getElementById("app").innerHTML = "Bill number missing in report link.";
        return;
      }

      try {
        const res = await fetch("/api/reports/" + encodeURIComponent(billNo));
        const data = await res.json();

        if (!data.success) {
          throw new Error(data.message || "Report API failed");
        }

        const booking = data.booking || {};
        const results = normalizeResults(data.results || []);

        if (!results.length) {
          document.getElementById("app").className = "error-box";
          document.getElementById("app").innerHTML = `
            Report is not released yet or result was not saved permanently.<br><br>
            Bill No: ${safe(billNo)}
          `;
          return;
        }

        const patientName = pick(booking, ["patient_name", "patientName", "name"], pick(results[0], ["patientName"], ""));
        const age = pick(booking, ["patient_age", "age"], "");
        const gender = pick(booking, ["patient_gender", "gender"], "");
        const refBy = pick(booking, ["ref_doctor", "refDoctor", "doctor", "ref_by"], "");
        const collectionDate = pick(booking, ["collection_date", "collectionDate", "admission_date", "created_at"], "");
        const registeredDate = pick(booking, ["registered_date", "registeredDate", "created_at"], "");
        const reportedDate = pick(booking, ["reporting_date", "reportedDate", "updated_at"], "");
        const status = pick(booking, ["report_status", "status"], "Final");

        document.title = "Report - " + billNo;

        document.getElementById("app").className = "report-page";
        document.getElementById("app").innerHTML = `
          <div class="lab-header">
            <div class="lab-name">KhunTest Lab</div>
            <div class="lab-subtitle">Accurate • Reliable • Trusted</div>
            <div class="lab-address">
              Diagnostic Centre | Darbhanga, Bihar<br>
              Online Report Verification & Patient Report
            </div>
          </div>

          <div class="patient-block">
            <div>
              <div class="info-row">
                <div class="label">Patient Name</div><div class="colon">:</div>
                <div class="value">${safe(patientName)}</div>
              </div>
              <div class="info-row">
                <div class="label">Age/Gender</div><div class="colon">:</div>
                <div class="value">${safe(age)}${age && gender ? "/" : ""}${safe(gender)}</div>
              </div>
              <div class="info-row">
                <div class="label">Bill No</div><div class="colon">:</div>
                <div class="value">${safe(billNo)}</div>
              </div>
              <div class="info-row">
                <div class="label">Ref. By</div><div class="colon">:</div>
                <div class="value">${safe(refBy)}</div>
              </div>
            </div>

            <div>
              <div class="info-row">
                <div class="label">Collection Date</div><div class="colon">:</div>
                <div class="value">${safe(formatDate(collectionDate))}</div>
              </div>
              <div class="info-row">
                <div class="label">Registered Date</div><div class="colon">:</div>
                <div class="value">${safe(formatDate(registeredDate))}</div>
              </div>
              <div class="info-row">
                <div class="label">Reported Date</div><div class="colon">:</div>
                <div class="value">${safe(formatDate(reportedDate))}</div>
              </div>
              <div class="info-row">
                <div class="label">Report Status</div><div class="colon">:</div>
                <div class="value status-final">${safe(status || "Final")}</div>
              </div>
            </div>
          </div>

          <table class="result-table">
            <thead>
              <tr>
                <th class="test-col">Test-Name</th>
                <th class="result-col">Results</th>
                <th class="range-col">Biological Reference Range</th>
                <th class="unit-col">Units</th>
              </tr>
            </thead>
            <tbody>
              ${buildResultRows(results)}
            </tbody>
          </table>

          <div class="end-report">*** End of Report ***</div>

          <div class="signature-area">
            <div class="signature-box">
              <div class="signature-line">Lab Technician</div>
            </div>
            <div class="signature-box">
              <div class="signature-line">Authorized Signatory</div>
            </div>
          </div>
        `;
      } catch (err) {
        console.error(err);
        document.getElementById("app").className = "error-box";
        document.getElementById("app").innerHTML = `
          Report loading failed.<br><br>
          ${safe(err.message)}
        `;
      }
    }

    loadReport();
  </script>
</body>
</html>
