<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>KhunTest Lab Report</title>
  <style>
    @page {
      size: A4 portrait;
      margin: 0;
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      margin: 0;
      padding: 0;
      background: #e5e7eb;
      color: #111;
      font-family: Arial, Helvetica, sans-serif;
      font-size: 11px;
      line-height: 1.2;
    }

    .no-print {
      position: sticky;
      top: 0;
      z-index: 20;
      display: flex;
      justify-content: center;
      gap: 10px;
      flex-wrap: wrap;
      padding: 12px;
      background: #f8fafc;
      border-bottom: 1px solid #cbd5e1;
    }

    .no-print button {
      border: 0;
      border-radius: 8px;
      padding: 10px 16px;
      background: #062b59;
      color: #fff;
      font-weight: 700;
      cursor: pointer;
    }

    .no-print .back-btn {
      background: #d60000;
    }

    .no-print .pdf-btn {
      background: #0b4d92;
    }

    .print-note {
      width: 100%;
      color: #334155;
      text-align: center;
      font-size: 12px;
    }

    .hidden {
      display: none !important;
    }

    .report-preview-wrap {
      overflow-x: auto;
      padding: 1px 0 24px;
    }

    .report-page {
      width: 210mm;
      height: 297mm;
      margin: 20px auto;
      background: #fff;
      box-shadow: 0 0 18px rgba(0,0,0,0.18);
      position: relative;
      overflow: hidden;
    }

    .lab-letterhead {
      position: absolute;
      inset: 0 0 auto 0;
      height: 39mm;
      z-index: 3;
    }

    .top-red-strip {
      position: absolute;
      top: 2.5mm;
      left: 3.5mm;
      right: 3.5mm;
      height: 7.5mm;
      background: #e30613;
    }

    .header-white-mask {
      position: absolute;
      top: 10mm;
      left: 3.5mm;
      width: 124mm;
      height: 25mm;
      background: #fff;
      transform: skewX(-20deg);
      transform-origin: left top;
    }

    .brand-block {
      position: absolute;
      top: 11.5mm;
      left: 9mm;
      display: flex;
      align-items: center;
      gap: 4.5mm;
      height: 22mm;
      color: #082653;
    }

    .brand-mark {
      width: 21mm;
      height: 21mm;
      display: block;
      overflow: hidden;
      border-radius: 50%;
      background: #fff;
    }

    .brand-mark img {
      width: 21mm;
      height: 21mm;
      object-fit: contain;
      transform: scale(2.05);
      transform-origin: 50% 25%;
    }

    .brand-title {
      font-weight: 900;
      font-size: 10mm;
      line-height: .78;
      letter-spacing: 1.4px;
      white-space: nowrap;
    }

    .brand-title .red {
      color: #e30613;
    }

    .brand-lab {
      margin-top: 2.1mm;
      display: flex;
      align-items: center;
      gap: 2mm;
      color: #061b36;
      font-size: 4.7mm;
      font-weight: 900;
      letter-spacing: 5px;
      line-height: 1;
    }

    .brand-lab::before,
    .brand-lab::after {
      content: "";
      width: 16mm;
      border-top: .5mm solid #061b36;
    }

    .tagline {
      margin-top: 1.8mm;
      text-align: center;
      color: #5b6470;
      font-size: 1.75mm;
      letter-spacing: 1.5px;
      font-weight: 700;
    }

    .contact-panel {
      position: absolute;
      top: 10mm;
      right: 3.5mm;
      width: 72mm;
      height: 25mm;
      padding: 4.1mm 5mm 3mm 18mm;
      background: #061f4f;
      color: #fff;
      clip-path: polygon(13mm 0, 100% 0, 100% 100%, 0 100%);
      font-size: 3.1mm;
      font-weight: 700;
      line-height: 1.32;
    }

    .contact-line {
      display: grid;
      grid-template-columns: 4.2mm 1fr;
      gap: 2.2mm;
      align-items: center;
      white-space: nowrap;
    }

    .contact-icon {
      display: inline-grid;
      place-items: center;
      width: 3.5mm;
      height: 3.5mm;
      border-radius: 50%;
      background: #fff;
      color: #e30613;
      font-size: 2.15mm;
      font-weight: 900;
    }

    .header-slashes {
      position: absolute;
      top: 8.2mm;
      left: 100mm;
      width: 34mm;
      height: 27mm;
      transform: skewX(-25deg);
      background:
        linear-gradient(90deg, transparent 0 3mm, #12345e 3mm 4mm, transparent 4mm 6.2mm, #456d9e 6.2mm 7.2mm, transparent 7.2mm 9.4mm, #7ea0c6 9.4mm 10.4mm, transparent 10.4mm 12.6mm, #b8c9df 12.6mm 13.6mm, transparent 13.6mm);
      opacity: .98;
    }

    .header-corner-lines {
      position: absolute;
      top: 2.4mm;
      right: 26mm;
      width: 24mm;
      height: 11mm;
      transform: skewX(22deg);
      background:
        linear-gradient(90deg, transparent 0 2mm, #e30613 2mm 2.8mm, transparent 2.8mm 4.6mm, #e30613 4.6mm 5.4mm, transparent 5.4mm 7.2mm, #e30613 7.2mm 8mm, transparent 8mm);
      opacity: .9;
    }

    .report-watermark {
      position: absolute;
      top: 94mm;
      left: 50%;
      width: 126mm;
      transform: translateX(-50%);
      opacity: .075;
      z-index: 0;
      pointer-events: none;
    }

    .report-content {
      position: absolute;
      top: 62mm;
      left: 14mm;
      right: 14mm;
      bottom: 42mm;
      z-index: 2;
    }

    .patient-header {
      border-top: 1.4px solid #222;
      border-bottom: 1.2px solid #222;
      padding: 2mm 0 1.5mm;
      display: grid;
      grid-template-columns: 34mm 1fr 30mm 69mm;
      gap: 3mm;
      align-items: center;
      font-size: 2.85mm;
    }

    .barcode {
      height: 17mm;
      width: 21mm;
      justify-self: center;
      background:
        repeating-linear-gradient(
          90deg,
          #111 0,
          #111 1.1px,
          #fff 1.1px,
          #fff 3.2px,
          #111 3.2px,
          #111 4px,
          #fff 4px,
          #fff 6.1px
        );
    }

    .patient-left,
    .patient-right {
      display: grid;
      gap: 1px;
    }

    .info-line {
      display: grid;
      grid-template-columns: max-content 7px 1fr;
      gap: 2px;
      min-height: 3.7mm;
      align-items: baseline;
    }

    .info-line .label {
      font-weight: 800;
    }

    .info-line .value {
      font-weight: 700;
      word-break: break-word;
    }

    .info-line .status {
      font-weight: 900;
    }

    .qr {
      width: 20mm;
      height: 20mm;
      margin-inline: auto;
      border: .4mm solid #111;
      background:
        conic-gradient(from 90deg, #111 25%, #fff 0 50%, #111 0 75%, #fff 0) 0 0 / 4mm 4mm,
        repeating-linear-gradient(90deg, #111 0 1px, #fff 1px 3px);
      opacity: .78;
    }

    .result-table {
      width: 100%;
      border-collapse: collapse;
      table-layout: fixed;
      margin-top: 0;
      font-size: 3.45mm;
    }

    .result-table th {
      padding: 1mm 1.4mm;
      border-top: 1.2px solid #222;
      border-bottom: 1.2px solid #222;
      text-align: center;
      font-size: 3.65mm;
      font-weight: 800;
    }

    .result-table td {
      padding: .72mm 1.4mm;
      vertical-align: top;
    }

    .test-col {
      width: 42%;
    }

    .result-col {
      width: 18%;
      text-align: center;
    }

    .range-col {
      width: 28%;
      text-align: center;
    }

    .unit-col {
      width: 12%;
      text-align: center;
    }

    .category-row td {
      padding: 1.4mm 1.4mm .9mm;
      text-align: center;
      text-decoration: underline;
      text-transform: uppercase;
      font-weight: 800;
    }

    .group-row td {
      padding-top: 2.4mm;
      font-weight: 800;
      text-decoration: underline;
      text-transform: none;
    }

    .parameter-name {
      font-weight: 700;
    }

    .result-value {
      font-weight: 700;
    }

    .note-row td {
      padding-top: 0;
      font-size: 3.05mm;
      font-style: italic;
      line-height: 1.25;
    }

    .subhead-row td {
      padding-top: 1.5mm;
      font-weight: 800;
      text-decoration: underline;
    }

    .comment-row td {
      padding-top: 1.7mm;
      font-size: 3mm;
      line-height: 1.35;
      text-align: justify;
    }

    .end-area {
      margin: 1.5mm 5mm 0;
      border-top: 1px dotted #111;
      text-align: center;
      font-weight: 800;
      padding-top: 2.3mm;
      font-size: 3.6mm;
    }

    .continued {
      margin-top: 2mm;
      text-align: right;
      font-size: 3mm;
      font-style: italic;
    }

    .signature-area {
      position: absolute;
      left: 15mm;
      right: 15mm;
      bottom: 31mm;
      z-index: 2;
      display: flex;
      justify-content: space-between;
      align-items: end;
      color: #293040;
    }

    .signature {
      width: 52mm;
      text-align: center;
      font-size: 3.3mm;
    }

    .signature-icon {
      display: inline-grid;
      place-items: center;
      width: 8mm;
      height: 8mm;
      margin-bottom: 1.2mm;
      border-radius: 50%;
      background: #061f4f;
      color: #fff;
      font-size: 4mm;
      line-height: 1;
    }

    .signature-line {
      width: 41mm;
      height: .7mm;
      margin: .8mm auto 1.1mm;
      background: #2d2d2d;
    }

    .signature-name {
      color: #e30613;
      font-size: 4mm;
      font-weight: 900;
    }

    .report-footer {
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      height: 22mm;
      z-index: 3;
    }

    .footer-note {
      position: absolute;
      left: 88mm;
      right: 7mm;
      top: 1mm;
      color: #30343b;
      font-size: 2.85mm;
      line-height: 1.35;
    }

    .footer-note-icon {
      position: absolute;
      left: -9mm;
      top: .5mm;
      width: 7mm;
      height: 8mm;
      border: .5mm solid #333;
      border-radius: .8mm;
    }

    .footer-note-icon::before {
      content: "";
      position: absolute;
      top: 1.4mm;
      left: 1.3mm;
      width: 3.6mm;
      height: .4mm;
      background: #333;
      box-shadow: 0 1.7mm 0 #333, 0 3.4mm 0 #333;
    }

    .footer-strip {
      position: absolute;
      left: 0;
      right: 0;
      bottom: 0;
      height: 10mm;
      background: #e30613;
      color: #fff;
      font-size: 3.15mm;
      font-weight: 900;
      text-align: right;
      padding: 3mm 8mm 0 0;
    }

    .footer-navy {
      position: absolute;
      left: 0;
      bottom: 0;
      width: 72mm;
      height: 13mm;
      background: #061f4f;
      clip-path: polygon(0 0, 65mm 0, 72mm 100%, 0 100%);
    }

    .footer-white-cuts {
      position: absolute;
      left: 67mm;
      bottom: 9.2mm;
      width: 21mm;
      height: 6mm;
      transform: skewX(25deg);
      background:
        linear-gradient(90deg, transparent 0 2mm, #fff 2mm 3.1mm, transparent 3.1mm 5mm, #7ea0c6 5mm 6mm, transparent 6mm 7.8mm, #fff 7.8mm 8.8mm, transparent 8.8mm);
    }

    .footer-red-slashes {
      position: absolute;
      left: 19mm;
      bottom: 2mm;
      width: 23mm;
      height: 8mm;
      transform: skewX(15deg);
      background:
        linear-gradient(90deg, transparent 0 2mm, #e30613 2mm 3.1mm, transparent 3.1mm 4.9mm, #e30613 4.9mm 6mm, transparent 6mm 7.8mm, #e30613 7.8mm 8.9mm, transparent 8.9mm 10.7mm, #e30613 10.7mm 11.8mm, transparent 11.8mm);
    }

    .loading,
    .error-box {
      max-width: 760px;
      margin: 70px auto;
      padding: 28px;
      border-radius: 14px;
      background: #fff;
      text-align: center;
      box-shadow: 0 10px 35px rgba(0,0,0,.15);
      font-weight: 700;
    }

    .loading {
      color: #062b59;
    }

    .error-box {
      color: #991b1b;
    }

    @media (max-width: 900px) {
      .report-page {
        margin: 12px;
      }
    }

    @media print {
      html,
      body {
        width: 210mm;
        min-height: 297mm;
        margin: 0;
        padding: 0;
        background: #fff;
      }

      .no-print {
        display: none !important;
      }

      .report-preview-wrap {
        padding: 0;
        overflow: visible;
      }

      .report-page {
        width: 210mm;
        height: 297mm;
        box-sizing: border-box;
        page-break-after: always;
        break-after: page;
        background: #fff;
        overflow: hidden;
        margin: 0;
        box-shadow: none;
      }

      .report-page:last-child {
        page-break-after: auto;
        break-after: auto;
      }

      a {
        color: #000;
        text-decoration: none;
      }
    }
  </style>
</head>
<body>
  <div class="no-print">
    <button onclick="window.print()">Print Report</button>
    <button class="pdf-btn" onclick="window.print()">Download/Save PDF</button>
    <button id="shareWhatsAppBtn" class="hidden" onclick="shareReportWhatsApp()">Share on WhatsApp</button>
    <button class="back-btn" onclick="window.location.href='admin-dashboard.html'">Back to Dashboard</button>
    <div class="print-note">For best print: Paper A4, Scale 100%, Margins None/Default, Background Graphics ON.</div>
  </div>

  <main id="app" class="loading">Loading report...</main>

  <script type="module">
    import { getBookingByBillNo, getReportByBillNo } from "./firebase-service.js";

    const ROWS_PER_PAGE = 22;

    function getParams() {
      return new URLSearchParams(window.location.search);
    }

    function getBillNo() {
      const params = getParams();
      return params.get("bill") || params.get("billNo") || params.get("bill_no") || "";
    }

    function safe(value) {
      if (value === null || value === undefined) return "";
      return String(value)
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }

    function pick(obj, keys, fallback = "") {
      if (!obj) return fallback;
      for (const key of keys) {
        if (obj[key] !== undefined && obj[key] !== null && obj[key] !== "") return obj[key];
      }
      return fallback;
    }

    function formatDate(value) {
      if (!value) return "";
      const date = value.toDate ? value.toDate() : new Date(value);
      if (isNaN(date.getTime())) return String(value);
      return date.toLocaleString("en-IN", {
        day: "2-digit",
        month: "2-digit",
        year: "numeric",
        hour: "2-digit",
        minute: "2-digit",
        hour12: false
      }).replace(",", "");
    }

    function normalizeResult(row) {
      const testName = pick(row, ["testName", "test_name", "test", "groupName", "group"], "");
      const parameterName = pick(row, ["parameterName", "parameter_name", "parameter", "test_parameter", "name"], testName);
      const headingText = String(parameterName || "").toLowerCase();
      return {
        category: pick(row, ["category", "department", "section"], ""),
        testName,
        parameterName,
        resultValue: pick(row, ["resultValue", "result_value", "value", "finding", "result"], ""),
        normalValue: pick(row, ["normalRange", "normalValue", "normal_value", "referenceRange", "reference_range", "range", "normal"], ""),
        unit: pick(row, ["unit", "units"], ""),
        method: pick(row, ["method", "methodName", "method_name"], ""),
        sample: pick(row, ["sample", "sampleType", "sample_type"], ""),
        comment: pick(row, ["comment", "remarks", "description", "interpretation"], ""),
        details: Array.isArray(row.details) ? row.details : [],
        isHeading: Boolean(row.isHeading || row.heading || row.type === "heading" || headingText.includes("differential count"))
      };
    }

    function normalizeResults(results) {
      if (!Array.isArray(results)) return [];
      return results.map(normalizeResult).filter((row) => (
        row.category || row.testName || row.parameterName || row.resultValue || row.normalValue || row.unit || row.comment || row.details.length
      ));
    }

    function groupResults(results) {
      const groups = new Map();
      results.forEach((row) => {
        const category = row.category || "";
        const testName = row.testName || row.parameterName || "Report";
        const key = `${category}__${testName}`;
        if (!groups.has(key)) {
          groups.set(key, { category, testName, rows: [], comments: [] });
        }
        const group = groups.get(key);
        group.rows.push(row);
        if (row.comment && !row.method && !row.sample && row.parameterName === row.testName) {
          group.comments.push(row.comment);
        }
      });
      return Array.from(groups.values());
    }

    function chunkRows(rows) {
      const chunks = [];
      for (let i = 0; i < rows.length; i += ROWS_PER_PAGE) {
        chunks.push(rows.slice(i, i + ROWS_PER_PAGE));
      }
      return chunks.length ? chunks : [[]];
    }

    function noteText(row) {
      const parts = [];
      if (row.sample) parts.push(`Sample-${row.sample}`);
      if (row.method) parts.push(`Method- ${row.method}`);
      return parts.join(" ");
    }

    function rowHtml(row) {
      if (row.isHeading && row.parameterName) {
        return `<tr class="subhead-row"><td colspan="4">${safe(row.parameterName)}</td></tr>`;
      }

      let html = `
        <tr>
          <td class="test-col"><span class="parameter-name">${safe(row.parameterName || row.testName)}</span></td>
          <td class="result-col result-value">${safe(row.resultValue)}</td>
          <td class="range-col">${safe(row.normalValue)}</td>
          <td class="unit-col">${safe(row.unit)}</td>
        </tr>
      `;

      const note = noteText(row);
      if (note) {
        html += `<tr class="note-row"><td colspan="4">${safe(note)}</td></tr>`;
      }

      if (row.comment && (row.method || row.sample || row.parameterName !== row.testName)) {
        html += `<tr class="comment-row"><td colspan="4">${safe(row.comment)}</td></tr>`;
      }

      row.details.forEach((detail) => {
        const detailRow = normalizeResult(detail);
        html += `
          <tr>
            <td class="test-col"><span class="parameter-name">${safe(detailRow.parameterName || detailRow.testName)}</span></td>
            <td class="result-col result-value">${safe(detailRow.resultValue)}</td>
            <td class="range-col">${safe(detailRow.normalValue)}</td>
            <td class="unit-col">${safe(detailRow.unit)}</td>
          </tr>
        `;
        const detailNote = noteText(detailRow);
        if (detailNote) html += `<tr class="note-row"><td colspan="4">${safe(detailNote)}</td></tr>`;
      });

      return html;
    }

    function letterheadHtml() {
      return `
        <header class="lab-letterhead">
          <div class="top-red-strip"></div>
          <div class="header-white-mask"></div>
          <div class="header-slashes"></div>
          <div class="header-corner-lines"></div>
          <div class="brand-block">
            <span class="brand-mark"><img src="assets/khuntest-logo.png" alt="KhunTest Lab"></span>
            <div>
              <div class="brand-title"><span class="red">KHUN</span>TEST</div>
              <div class="brand-lab">LAB</div>
              <div class="tagline">ACCURATE &bull; RELIABLE &bull; TRUSTED</div>
            </div>
          </div>
          <div class="contact-panel">
            <div class="contact-line"><span class="contact-icon">P</span><span>Allalpatti, Darbhanga</span></div>
            <div class="contact-line"><span class="contact-icon">T</span><span>9234277007, 88772 65544</span></div>
            <div class="contact-line"><span class="contact-icon">@</span><span>khuntest@yahoo.com</span></div>
            <div class="contact-line"><span class="contact-icon">W</span><span>khuntest.com</span></div>
          </div>
        </header>
      `;
    }

    function patientBlock(report, billNo) {
      const patientName = pick(report, ["patientName", "patient_name", "name"], "");
      const age = pick(report, ["age", "patient_age"], "");
      const gender = pick(report, ["gender", "patient_gender"], "");
      const refBy = pick(report, ["refBy", "ref_by", "doctor", "refDoctor", "ref_doctor"], "");
      const collectionDate = pick(report, ["collectionDate", "collection_date", "collDate", "createdAt"], "");
      const registeredDate = pick(report, ["registeredDate", "registered_date", "createdAt", "created_at"], "");
      const reportedDate = pick(report, ["reportedDate", "reportingDate", "reporting_date", "releasedAt", "updatedAt"], "");
      const status = pick(report, ["reportStatus", "report_status", "status"], "Final");

      return `
        <header class="patient-header">
          <div class="barcode" aria-hidden="true"></div>
          <div class="patient-left">
            <div class="info-line"><span class="label">PATIENT NAME</span><span>:</span><span class="value">${safe(patientName)}</span></div>
            <div class="info-line"><span>Bill No</span><span>:</span><span class="value">${safe(billNo)}</span></div>
            <div class="info-line"><span>Age/Gender</span><span>:</span><span class="value">${safe(age)}${age && gender ? "/" : ""}${safe(gender)}</span></div>
            <div class="info-line"><span class="label">Report Status</span><span>:</span><span class="value status">${safe(status || "Final")}</span></div>
          </div>
          <div class="qr" aria-hidden="true"></div>
          <div class="patient-right">
            <div class="info-line"><span>Registered Date</span><span>:</span><span class="value">${safe(formatDate(registeredDate))}</span></div>
            <div class="info-line"><span>Collection Date</span><span>:</span><span class="value">${safe(formatDate(collectionDate))}</span></div>
            <div class="info-line"><span>Reported Date</span><span>:</span><span class="value">${safe(formatDate(reportedDate))}</span></div>
            <div class="info-line"><span>Ref. By</span><span>:</span><span class="value">${safe(refBy)}</span></div>
          </div>
        </header>
      `;
    }

    function signatureHtml() {
      return `
        <div class="signature-area">
          <div class="signature">
            <div class="signature-icon">T</div>
            <div>Technician</div>
            <div class="signature-line"></div>
            <div class="signature-name">MR. R. K. Suman</div>
          </div>
          <div class="signature">
            <div class="signature-icon">M</div>
            <div>Pathologist</div>
            <div class="signature-line"></div>
            <div class="signature-name">Dr. N. K. Suman</div>
          </div>
        </div>
      `;
    }

    function footerHtml() {
      return `
        <footer class="report-footer">
          <div class="footer-note">
            <span class="footer-note-icon" aria-hidden="true"></span>
            <div>Note: The Report finding should be correlated with clinical Parameter.</div>
            <div>The test may be report it needed.</div>
          </div>
          <div class="footer-strip">This Report is not Valid for Medico-Legal Purpose</div>
          <div class="footer-navy"></div>
          <div class="footer-white-cuts"></div>
          <div class="footer-red-slashes"></div>
        </footer>
      `;
    }

    function pageHtml(report, billNo, group, rows, pageIndex, pageCount) {
      const showEnd = pageIndex === pageCount - 1;
      const continuation = pageIndex > 0 ? " (Continued)" : "";
      return `
        <section class="report-page">
          ${letterheadHtml()}
          <img class="report-watermark" src="assets/khuntest-logo.png" alt="">
          <div class="report-content">
            ${patientBlock(report, billNo)}
            <table class="result-table">
              <thead>
                <tr>
                  <th class="test-col">Test-Name</th>
                  <th class="result-col">Results</th>
                  <th class="range-col">Biological Reference Range</th>
                  <th class="unit-col">Units</th>
                </tr>
              </thead>
              <tbody>
                ${group.category ? `<tr class="category-row"><td colspan="4">${safe(group.category)}</td></tr>` : ""}
                <tr class="group-row"><td colspan="4">${safe(group.testName)}${safe(continuation)}</td></tr>
                ${rows.length ? rows.map(rowHtml).join("") : `<tr><td colspan="4" style="text-align:center;font-weight:700;padding:18px;">Report result not available.</td></tr>`}
                ${showEnd && group.comments.length ? `<tr class="comment-row"><td colspan="4">${safe(group.comments.join(" "))}</td></tr>` : ""}
              </tbody>
            </table>
            ${showEnd ? `<div class="end-area">*** End of Report ***</div>` : `<div class="continued">Continued on next page</div>`}
          </div>
          ${signatureHtml()}
          ${footerHtml()}
        </section>
      `;
    }

    function renderReport(report, billNo) {
      const results = normalizeResults(report.results || report.reportResults || []);
      if (!results.length) {
        showError(`Report is not released yet or result was not saved permanently.<br><br>Bill No: ${safe(billNo)}`);
        return;
      }

      const groups = groupResults(results);
      const pages = [];
      groups.forEach((group) => {
        const chunks = chunkRows(group.rows);
        chunks.forEach((rows, index) => {
          pages.push(pageHtml(report, billNo, group, rows, index, chunks.length));
        });
      });

      document.title = "Report - " + billNo;
      const app = document.getElementById("app");
      app.className = "report-preview-wrap";
      app.innerHTML = pages.join("");
      window.currentReportForShare = { report, billNo };
      document.getElementById("shareWhatsAppBtn").classList.remove("hidden");
    }

    window.shareReportWhatsApp = function() {
      const current = window.currentReportForShare;
      if (!current) return;
      const { report, billNo } = current;
      const phone = String(report.whatsapp || report.phone || "").replace(/\D/g, "");
      const fullPhone = phone.length === 10 ? "91" + phone : phone;
      const patientName = pick(report, ["patientName", "patient_name", "name"], "Patient");
      const reportUrl = `https://khuntest.com/report.html?bill=${encodeURIComponent(billNo)}`;
      const message = `Hello ${patientName},\nYour KhunTest Lab report is ready.\n\nDownload report:\n${reportUrl}\n\nThank you,\nKhunTest Lab\n+91 9234277007`;
      const waUrl = fullPhone
        ? `https://wa.me/${encodeURIComponent(fullPhone)}?text=${encodeURIComponent(message)}`
        : `https://wa.me/?text=${encodeURIComponent(message)}`;
      window.open(waUrl, "_blank");
    };

    function showError(message) {
      const app = document.getElementById("app");
      app.className = "error-box";
      app.innerHTML = message;
    }

    async function loadReport() {
      const params = getParams();
      const billNo = getBillNo();

      if (params.get("mock") === "1") {
        const report = mockReport();
        renderReport(report, report.billNo);
        return;
      }

      if (!billNo) {
        showError("Bill number missing in report link.");
        return;
      }

      try {
        const report = await getReportByBillNo(billNo);
        if (!report) {
          await getBookingByBillNo(billNo);
          showError(`Report not found or not released yet.<br><br>Bill No: ${safe(billNo)}`);
          return;
        }
        renderReport(report, billNo);
        if (params.get("print") === "1") setTimeout(() => window.print(), 350);
      } catch (err) {
        console.error(err);
        showError(`Report loading failed.<br><br>${safe(err.message)}`);
      }
    }

    loadReport();
  </script>
