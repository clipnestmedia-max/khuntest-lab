<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Forgot Password - KhunTest Lab</title>

  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      font-family: Arial, sans-serif;
    }

    body {
      min-height: 100vh;
      background: linear-gradient(135deg, #031b3a, #063b6f);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .card {
      width: 100%;
      max-width: 440px;
      background: #ffffff;
      border-radius: 22px;
      padding: 32px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.25);
    }

    h1 {
      color: #052b5f;
      font-size: 28px;
      margin-bottom: 8px;
      text-align: center;
    }

    p {
      color: #64748b;
      text-align: center;
      margin-bottom: 24px;
      font-size: 14px;
    }

    label {
      display: block;
      font-weight: 700;
      color: #0f172a;
      margin-bottom: 8px;
      font-size: 14px;
    }

    input {
      width: 100%;
      padding: 14px;
      border: 1px solid #cbd5e1;
      border-radius: 12px;
      font-size: 15px;
      margin-bottom: 16px;
      outline: none;
    }

    input:focus {
      border-color: #0b5ed7;
      box-shadow: 0 0 0 3px rgba(11,94,215,0.15);
    }

    button {
      width: 100%;
      border: none;
      background: #d60000;
      color: #fff;
      padding: 14px;
      border-radius: 14px;
      font-size: 16px;
      font-weight: 800;
      cursor: pointer;
      margin-bottom: 14px;
    }

    button.secondary {
      background: #052b5f;
    }

    .msg {
      display: none;
      margin: 12px 0;
      padding: 12px;
      border-radius: 10px;
      font-size: 14px;
    }

    .msg.error {
      display: block;
      background: #fee2e2;
      color: #991b1b;
    }

    .msg.success {
      display: block;
      background: #dcfce7;
      color: #166534;
    }

    .back {
      text-align: center;
      margin-top: 12px;
    }

    .back a {
      color: #0b5ed7;
      font-weight: 700;
      text-decoration: none;
    }

    .otp-box {
      margin-top: 18px;
      border-top: 1px solid #e2e8f0;
      padding-top: 20px;
    }
  </style>
</head>
<body>

  <div class="card">
    <h1>Forgot Password</h1>
    <p id="panelText">Reset your password using email OTP</p>

    <label>Email</label>
    <input id="email" type="email" placeholder="Enter your registered email" />

    <button type="button" onclick="sendOtp()">Send OTP</button>

    <div class="otp-box">
      <label>OTP</label>
      <input id="otp" type="text" placeholder="Enter 6 digit OTP" />

      <label>New Password</label>
      <input id="newPassword" type="password" placeholder="Enter new password" />

      <button type="button" class="secondary" onclick="resetPassword()">Reset Password</button>
    </div>

    <div id="message" class="msg"></div>

    <div class="back">
      <a id="backLink" href="admin-login.html">← Back to Login</a>
    </div>
  </div>

  <script>
    const params = new URLSearchParams(window.location.search);
    const role = params.get("role") || "patient";

    const msg = document.getElementById("message");
    const panelText = document.getElementById("panelText");
    const backLink = document.getElementById("backLink");

    if (role === "admin") {
      panelText.textContent = "Admin password reset using email OTP";
      backLink.href = "admin-login.html";
    } else {
      panelText.textContent = "Patient password reset using email OTP";
      backLink.href = "patient-login.html";
    }

    function showMessage(text, type) {
      msg.textContent = text;
      msg.className = "msg " + type;
    }

    async function sendOtp() {
      const email = document.getElementById("email").value.trim();

      if (!email) {
        showMessage("Please enter email.", "error");
        return;
      }

      showMessage("Sending OTP...", "success");

      try {
        const res = await fetch("/api/auth/forgot-password", {
          method: "POST",
          headers: {
            "Content-Type": "application/json"
          },
          body: JSON.stringify({
            email: email,
            role: role
          })
        });

        const data = await res.json();

        if (!data.success) {
          showMessage(data.message || "OTP send failed.", "error");
          return;
        }

        showMessage("OTP sent to your email.", "success");
      } catch (err) {
        console.error(err);
        showMessage("Server/email connection error.", "error");
      }
    }

    async function resetPassword() {
      const email = document.getElementById("email").value.trim();
      const otp = document.getElementById("otp").value.trim();
      const newPassword = document.getElementById("newPassword").value;

      if (!email || !otp || !newPassword) {
        showMessage("Email, OTP and new password required.", "error");
        return;
      }

      if (newPassword.length < 6) {
        showMessage("Password must be at least 6 characters.", "error");
        return;
      }

      showMessage("Resetting password...", "success");

      try {
        const res = await fetch("/api/auth/reset-password", {
          method: "POST",
          headers: {
            "Content-Type": "application/json"
          },
          body: JSON.stringify({
            email: email,
            otp: otp,
            newPassword: newPassword
          })
        });

        const data = await res.json();

        if (!data.success) {
          showMessage(data.message || "Password reset failed.", "error");
          return;
        }

        showMessage("Password reset successful. Redirecting...", "success");

        setTimeout(function() {
          if (role === "admin") {
            window.location.href = "admin-login.html";
          } else {
            window.location.href = "patient-login.html";
          }
        }, 1000);
      } catch (err) {
        console.error(err);
        showMessage("Server connection error.", "error");
      }
    }
  </script>

</body>
</html>
