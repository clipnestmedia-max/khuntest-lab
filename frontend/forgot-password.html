<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Forgot Password - KhunTest Lab</title>
  <link rel="stylesheet" href="styles.css">
  <style>
    body{min-height:100vh;background:linear-gradient(135deg,#031b3a,#063b6f);display:grid;place-items:center;padding:20px}
    .card{width:100%;max-width:440px;background:#fff;border-radius:22px;padding:32px;box-shadow:0 20px 60px rgba(0,0,0,.25)}
    .logo{width:72px;height:72px;object-fit:contain;margin:0 auto 14px;border-radius:16px}
    h1{color:#052b5f;font-size:28px;margin:0 0 8px;text-align:center}
    p{color:#64748b;text-align:center;margin:0 0 24px;font-size:14px}
    button{width:100%;margin-top:4px}
    .msg{display:none;margin:14px 0 0;padding:12px;border-radius:10px;font-size:14px}
    .msg.error{display:block;background:#fee2e2;color:#991b1b}
    .msg.success{display:block;background:#dcfce7;color:#166534}
    .back{text-align:center;margin-top:16px}
    .back a{color:#0b5ed7;font-weight:800;text-decoration:none}
    @media (max-width:480px){.card{padding:24px}}
  </style>
</head>
<body>
  <div class="card">
    <img class="logo" src="assets/khuntest-logo.png" alt="KhunTest Lab Logo">
    <h1>Forgot Password</h1>
    <p>Enter your registered email. We will send a secure password reset link.</p>

    <form id="resetForm">
      <label for="email">Email</label>
      <input id="email" type="email" placeholder="Enter your registered email" autocomplete="email" required>
      <button class="btn btn-red" type="submit">Send Reset Link</button>
    </form>

    <div id="message" class="msg"></div>

    <div class="back">
      <a id="backLink" href="patient-login.html">← Back to Login</a>
    </div>
  </div>

  <script type="module">
    import { sendPasswordResetEmail } from "https://www.gstatic.com/firebasejs/10.12.5/firebase-auth.js";
    import { auth } from "./firebase-config.js";

    const params = new URLSearchParams(window.location.search);
    const role = params.get("role") || "patient";
    const msg = document.getElementById("message");
    const backLink = document.getElementById("backLink");

    backLink.href = role === "admin" ? "admin-login.html" : "patient-login.html";

    function showMessage(text, type) {
      msg.textContent = text;
      msg.className = "msg " + type;
    }

    document.getElementById("resetForm").addEventListener("submit", async function(e) {
      e.preventDefault();

      const email = document.getElementById("email").value.trim();
      if (!email) {
        showMessage("Please enter email.", "error");
        return;
      }

      showMessage("Sending password reset link...", "success");

      try {
        await sendPasswordResetEmail(auth, email);
        showMessage("Password reset link sent to your email. Please check inbox/spam.", "success");
      } catch (err) {
        console.error(err);
        showMessage(err.message || "Password reset email could not be sent.", "error");
      }
    });
  </script>
</body>
</html>
