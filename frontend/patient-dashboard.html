<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Patient Dashboard - KhunTest Lab</title>

  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      font-family: Arial, sans-serif;
    }

    body {
      min-height: 100vh;
      background: #f5f8fc;
      color: #0f172a;
    }

    .topbar {
      background: #062b5f;
      color: #fff;
      padding: 18px 30px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .brand {
      font-size: 22px;
      font-weight: 900;
    }

    .logout-btn {
      border: none;
      background: #d60000;
      color: #fff;
      padding: 10px 18px;
      border-radius: 10px;
      font-weight: 800;
      cursor: pointer;
    }

    .container {
      max-width: 1100px;
      margin: 30px auto;
      padding: 0 20px;
    }

    .welcome {
      background: #fff;
      border-radius: 18px;
      padding: 26px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.06);
      margin-bottom: 22px;
    }

    .welcome h1 {
      color: #062b5f;
      margin-bottom: 8px;
    }

    .cards {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 18px;
      margin-bottom: 24px;
    }

    .card {
      background: #fff;
      border-radius: 18px;
      padding: 22px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.06);
    }

    .card h3 {
      color: #64748b;
      font-size: 15px;
      margin-bottom: 10px;
    }

    .card .num {
      font-size: 30px;
      font-weight: 900;
      color: #062b5f;
    }

    .section {
      background: #fff;
      border-radius: 18px;
      padding: 24px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.06);
    }

    table {
      width: 100%;
      border-collapse: collapse;
      margin-top: 16px;
    }

    th, td {
      padding: 12px;
      border-bottom: 1px solid #e5e7eb;
      text-align: left;
      font-size: 14px;
    }

    th {
      background: #f1f5f9;
      color: #062b5f;
    }

    .btn {
      display: inline-block;
      background: #062b5f;
      color: #fff;
      text-decoration: none;
      padding: 8px 12px;
      border-radius: 8px;
      font-size: 13px;
      font-weight: 800;
    }

    .empty {
      padding: 20px;
      text-align: center;
      color: #64748b;
    }

    @media (max-width: 800px) {
      .cards {
        grid-template-columns: 1fr;
      }

      .topbar {
        padding: 15px;
      }

      table {
        font-size: 12px;
      }
    }
  </style>
</head>
<body>

  <div class="topbar">
    <div class="brand">KHUNTEST LAB - Patient Dashboard</div>
    <button class="logout-btn" onclick="logout()">Logout</button>
  </div>

  <div class="container">
    <div class="welcome">
      <h1 id="welcomeName">Welcome Patient</h1>
      <p id="patientEmail">Loading...</p>
    </div>

    <div class="cards">
      <div class="card">
        <h3>Total Bookings</h3>
        <div class="num" id="totalBookings">0</div>
      </div>

      <div class="card">
        <h3>Reports</h3>
        <div class="num" id="totalReports">0</div>
      </div>

      <div class="card">
        <h3>Status</h3>
        <div class="num" style="font-size:22px;" id="accountStatus">Active</div>
      </div>
    </div>

    <div class="section">
      <h2>Your Bookings / Reports</h2>
      <div id="bookingArea" class="empty">Loading bookings...</div>
    </div>
  </div>

  <script type="module">
    import { auth, getCurrentUserRole, getPatientBookings, getReportByBillNo, logoutUser } from "./firebase-service.js";
    import { onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.5/firebase-auth.js";

    function safe(value) {
      return String(value ?? "").replace(/[&<>"]/g, (m) => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;" }[m]));
    }

    function getUser() {
      try { return JSON.parse(localStorage.getItem("auth_user") || "{}"); } catch (e) { return {}; }
    }

    window.logout = async function() {
      await logoutUser();
      window.location.href = "patient-login.html";
    };

    async function protectPage() {
      const current = await new Promise((resolve) => {
        const unsub = onAuthStateChanged(auth, (user) => {
          unsub();
          resolve(user);
        });
      });
      const user = getUser();
      const role = current ? await getCurrentUserRole() : null;
      if (!current || role !== "patient") {
        window.location.href = "patient-login.html";
        return null;
      }
      return user;
    }

    async function loadPatientDashboard() {
      const user = await protectPage();
      if (!user) return;

      document.getElementById("welcomeName").innerText =
        "Welcome, " + (user.name || "Patient");

      document.getElementById("patientEmail").innerText =
        user.email || "";

      try {
        const patientBookings = await getPatientBookings(user.email, user.phone);
        const reportFlags = await Promise.all(patientBookings.map(async (b) => {
          const bill = b.billNo || b.bill_no || "";
          return bill ? Boolean(await getReportByBillNo(bill)) : false;
        }));

        document.getElementById("totalBookings").innerText = patientBookings.length;
        document.getElementById("totalReports").innerText = reportFlags.filter(Boolean).length;

        const area = document.getElementById("bookingArea");

        if (!patientBookings.length) {
          area.innerHTML = "<div class='empty'>No booking found for this account.</div>";
          return;
        }

        area.innerHTML = `
          <table>
            <thead>
              <tr>
                <th>Bill No</th>
                <th>Patient</th>
                <th>Tests</th>
                <th>Amount</th>
                <th>Status</th>
                <th>Report</th>
              </tr>
            </thead>
            <tbody>
              ${patientBookings.map((b, index) => {
                const bill = b.bill_no || b.billNo || "";
                const tests = Array.isArray(b.tests)
                  ? b.tests.map(t => t.name || t.test_name || t.testName).filter(Boolean).join(", ")
                  : (b.test || "-");
                return `
                <tr>
                  <td>${safe(bill || "-")}</td>
                  <td>${safe(b.patient_name || b.patientName || user.name || "-")}</td>
                  <td>${safe(tests)}</td>
                  <td>₹${Number(b.totalAmount || b.gross_total || b.grossTotal || b.price || 0).toFixed(2)}</td>
                  <td>${safe(b.status || "Pending")}</td>
                  <td>
                    ${reportFlags[index]
                      ? `<a class="btn" href="report.html?bill=${encodeURIComponent(bill)}" target="_blank">View Report</a>`
                      : "Not released"}
                  </td>
                </tr>
              `}).join("")}
            </tbody>
          </table>
        `;
      } catch (err) {
        console.error(err);
        document.getElementById("bookingArea").innerHTML =
          "<div class='empty'>Unable to load bookings.</div>";
      }
    }

    document.addEventListener("DOMContentLoaded", loadPatientDashboard);
  </script>

</body>
</html>
