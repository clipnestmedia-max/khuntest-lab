<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Patient Dashboard - KHUNTEST LABS</title>

  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      font-family: Arial, sans-serif;
    }

    body {
      min-height: 100vh;
      background: #f5f8fc;
      color: #0f172a;
    }

    .topbar {
      background: #062b5f;
      color: #fff;
      padding: 18px 30px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .brand {
      font-size: 22px;
      font-weight: 900;
    }

    .logout-btn {
      border: none;
      background: #d60000;
      color: #fff;
      padding: 10px 18px;
      border-radius: 10px;
      font-weight: 800;
      cursor: pointer;
    }

    .container {
      max-width: 1100px;
      margin: 30px auto;
      padding: 0 20px;
    }

    .welcome {
      background: #fff;
      border-radius: 18px;
      padding: 26px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.06);
      margin-bottom: 22px;
    }

    .welcome h1 {
      color: #062b5f;
      margin-bottom: 8px;
    }

    .cards {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 18px;
      margin-bottom: 24px;
    }

    .card {
      background: #fff;
      border-radius: 18px;
      padding: 22px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.06);
    }

    .card h3 {
      color: #64748b;
      font-size: 15px;
      margin-bottom: 10px;
    }

    .card .num {
      font-size: 30px;
      font-weight: 900;
      color: #062b5f;
    }

    .section {
      background: #fff;
      border-radius: 18px;
      padding: 24px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.06);
    }

    table {
      width: 100%;
      border-collapse: collapse;
      margin-top: 16px;
    }

    th, td {
      padding: 12px;
      border-bottom: 1px solid #e5e7eb;
      text-align: left;
      font-size: 14px;
    }

    th {
      background: #f1f5f9;
      color: #062b5f;
    }

    .btn {
      display: inline-block;
      background: #062b5f;
      color: #fff;
      text-decoration: none;
      padding: 8px 12px;
      border-radius: 8px;
      font-size: 13px;
      font-weight: 800;
      border: 0;
      cursor: pointer;
    }
    .btn-red { background:#d60000; }
    .toolbar { display:flex; gap:10px; flex-wrap:wrap; margin:16px 0; }
    .profile-grid { display:grid; grid-template-columns:repeat(2,minmax(220px,1fr)); gap:12px; margin-top:14px; }
    .profile-grid .full { grid-column:1/-1; }
    input,select,textarea{width:100%;padding:10px;border:1px solid #d9e2ef;border-radius:8px;margin-top:6px}
    .msg{margin-top:10px;font-weight:800;color:#166534}

    .empty {
      padding: 20px;
      text-align: center;
      color: #64748b;
    }

    @media (max-width: 800px) {
      .cards {
        grid-template-columns: 1fr;
      }

      .topbar {
        padding: 15px;
      }

      table {
        font-size: 12px;
      }
      .profile-grid { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>

  <div class="topbar">
    <div class="brand">KHUNTEST LABS - Patient Dashboard</div>
    <button class="logout-btn" onclick="logout()">Logout</button>
  </div>

  <div class="container">
    <div class="welcome">
      <h1 id="welcomeName">Welcome Patient</h1>
      <p id="patientEmail">Loading...</p>
      <div class="toolbar">
        <a class="btn btn-red" href="booking.html">New Booking</a>
        <button class="btn" type="button" onclick="toggleProfile()">Edit Profile</button>
        <button class="btn" type="button" onclick="changePassword()">Change Password</button>
      </div>
      <form id="profileForm" class="profile-grid" style="display:none;">
        <label>Full Name<input name="name"></label>
        <label>Age<input name="age"></label>
        <label>Gender<select name="gender"><option></option><option>Male</option><option>Female</option><option>Other</option></select></label>
        <label>Mobile<input name="phone"></label>
        <label>WhatsApp<input name="whatsapp"></label>
        <label>Email<input name="email" readonly></label>
        <label class="full">Address<textarea name="address"></textarea></label>
        <label>City<input name="city"></label>
        <label>Pincode<input name="pincode"></label>
        <div class="full"><button class="btn btn-red" type="submit">Save Profile</button></div>
        <div id="profileMsg" class="msg full"></div>
      </form>
    </div>

    <div class="cards">
      <div class="card">
        <h3>Total Bookings</h3>
        <div class="num" id="totalBookings">0</div>
      </div>

      <div class="card">
        <h3>Reports</h3>
        <div class="num" id="totalReports">0</div>
      </div>

      <div class="card">
        <h3>Status</h3>
        <div class="num" style="font-size:22px;" id="accountStatus">Active</div>
      </div>
    </div>

    <div class="section">
      <h2>Your Bookings / Reports</h2>
      <div id="bookingArea" class="empty">Loading bookings...</div>
    </div>
  </div>

  <script type="module">
    import { auth, getCurrentUserRole, getPatientBookings, getReportByBillNo, listenMyOnlineBookings, logoutUser, resetPatientPassword, savePatientProfile } from "./firebase-service.js";
    import { onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.5/firebase-auth.js";

    function safe(value) {
      return String(value ?? "").replace(/[&<>"]/g, (m) => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;" }[m]));
    }

    function getUser() {
      try { return JSON.parse(localStorage.getItem("auth_user") || "{}"); } catch (e) { return {}; }
    }
    let currentAuthUser = null;
    let currentProfile = {};
    let onlineRows = [];

    window.logout = async function() {
      await logoutUser();
      window.location.href = "patient-login.html";
    };

    async function protectPage() {
      const current = await new Promise((resolve) => {
        const unsub = onAuthStateChanged(auth, (user) => {
          unsub();
          resolve(user);
        });
      });
      const user = getUser();
      currentAuthUser = current;
      currentProfile = user;
      const role = current ? await getCurrentUserRole() : null;
      if (!current || role !== "patient") {
        window.location.href = "patient-login.html";
        return null;
      }
      return user;
    }

    window.toggleProfile = function() {
      const form = document.getElementById("profileForm");
      form.style.display = form.style.display === "none" ? "grid" : "none";
    };

    window.changePassword = async function() {
      const email = currentProfile.email || currentAuthUser?.email;
      if (!email) return alert("Email not found.");
      await resetPatientPassword(email);
      alert("Password reset email sent.");
    };

    function fillProfileForm(user) {
      const f = document.getElementById("profileForm");
      ["name","age","gender","phone","whatsapp","email","address","city","pincode"].forEach((key) => {
        if (f.elements[key]) f.elements[key].value = user[key] || "";
      });
    }

    document.getElementById("profileForm").addEventListener("submit", async function(e) {
      e.preventDefault();
      const data = Object.fromEntries(new FormData(e.target).entries());
      await savePatientProfile(currentAuthUser.uid, { ...data, role: "patient", isActive: true, uid: currentAuthUser.uid });
      localStorage.setItem("auth_user", JSON.stringify({ ...currentProfile, ...data }));
      currentProfile = { ...currentProfile, ...data };
      document.getElementById("profileMsg").textContent = "Profile updated.";
    });

    async function requestOnlineEdit(id) {
      alert("This booking is already confirmed. Please call or WhatsApp KHUNTEST LABS to request changes.");
    }

    window.editOnlineBooking = function(id) {
      const row = onlineRows.find((b) => String(b.id || b.bookingId) === String(id));
      if (!row) return;
      const status = String(row.bookingStatus || row.status || "New");
      if (!["New", "Pending Confirmation"].includes(status)) return requestOnlineEdit(id);
      window.location.href = "booking.html";
    };

    async function loadPatientDashboard() {
      const user = await protectPage();
      if (!user) return;

      document.getElementById("welcomeName").innerText =
        "Welcome, " + (user.name || "Patient");

      document.getElementById("patientEmail").innerText =
        user.email || "";
      fillProfileForm(user);

      try {
        const patientBookings = await getPatientBookings(user.email, user.phone);
        const reportFlags = await Promise.all(patientBookings.map(async (b) => {
          const bill = b.billNo || b.bill_no || "";
          return bill ? Boolean(await getReportByBillNo(bill)) : false;
        }));

        if (currentAuthUser) {
          listenMyOnlineBookings(currentAuthUser.uid, (rows) => {
            onlineRows = rows;
            document.getElementById("totalBookings").innerText = patientBookings.length + onlineRows.length;
            renderBookings(patientBookings, reportFlags);
          }, (err) => console.error(err));
        }
        document.getElementById("totalBookings").innerText = patientBookings.length;
        document.getElementById("totalReports").innerText = reportFlags.filter(Boolean).length;

        if (!patientBookings.length && !onlineRows.length) {
          const area = document.getElementById("bookingArea");
          area.innerHTML = "<div class='empty'>No booking found for this account.</div>";
          return;
        }

        renderBookings(patientBookings, reportFlags);
      } catch (err) {
        console.error(err);
        document.getElementById("bookingArea").innerHTML =
          "<div class='empty'>Unable to load bookings.</div>";
      }
    }

    function renderBookings(patientBookings, reportFlags) {
        const area = document.getElementById("bookingArea");
        const onlineHtml = onlineRows.map((b) => `
          <tr>
            <td>${safe(b.bookingId || b.id || "-")}</td>
            <td>${safe(b.patientName || currentProfile.name || "-")}</td>
            <td>${safe((b.tests || b.selectedTests || []).map(t => t.name || t.testName).join(", "))}</td>
            <td>₹${Number(b.totalAmount || 0).toFixed(2)}</td>
            <td>${safe(b.bookingStatus || b.status || "New")}<br><small>Payment: ${safe(b.paymentStatus || "Pending")}</small></td>
            <td><button class="btn" onclick="editOnlineBooking('${safe(b.id || b.bookingId)}')">Edit</button></td>
          </tr>
        `).join("");
        area.innerHTML = `
          <table>
            <thead>
              <tr>
                <th>Bill No</th>
                <th>Patient</th>
                <th>Tests</th>
                <th>Amount</th>
                <th>Status</th>
                <th>Report</th>
              </tr>
            </thead>
            <tbody>
              ${patientBookings.map((b, index) => {
                const bill = b.bill_no || b.billNo || "";
                const selectedTests = Array.isArray(b.selectedTests) && b.selectedTests.length ? b.selectedTests : (Array.isArray(b.tests) ? b.tests : []);
                const tests = selectedTests.length
                  ? selectedTests.map(t => t.name || t.test_name || t.testName).filter(Boolean).join(", ")
                  : (b.test || "-");
                return `
                <tr>
                  <td>${safe(bill || "-")}</td>
                  <td>${safe(b.patient_name || b.patientName || user.name || "-")}</td>
                  <td>${safe(tests)}</td>
                  <td>₹${Number(b.totalAmount || b.gross_total || b.grossTotal || b.price || 0).toFixed(2)}</td>
                  <td>${safe(b.status || "Pending")}</td>
                  <td>
                    ${reportFlags[index]
                      ? `<a class="btn" href="report.html?bill=${encodeURIComponent(bill)}" target="_blank">View Report</a>`
                      : "Not released"}
                  </td>
                </tr>
              `}).join("")}
              ${onlineHtml}
            </tbody>
          </table>
        `;
    }

    document.addEventListener("DOMContentLoaded", loadPatientDashboard);
  </script>

</body>
</html>
